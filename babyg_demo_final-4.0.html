function handleInput(e){
  const t=e.target;
  if(t.id==='cmp-title')STATE.composer.title=t.value;
  else if(t.id==='cmp-body')STATE.composer.body=t.value;
  else if(t.id==='cmp-source')STATE.composer.source=t.value;
  else if(t.id==='cmp-valid')STATE.composer.validUntil=t.value;
  else if(t.id==='cmp-city')STATE.composer.city=t.value;
  else if(t.id==='cr-bio'){const cnt=$('#cr-bio-count');if(cnt)cnt.textContent=`${t.value.length}/200`}
  else if(t.id==='op-roster-search'){STATE.rosterFilter.search=t.value;debounce(()=>{render();const i=$('#op-roster-search');if(i){i.focus();i.setSelectionRange(t.value.length,t.value.length)}},'op-roster-search')}
  else if(t.id==='brand-search'){STATE.rosterFilter.search=t.value;debounce(()=>{render();const i=$('#brand-search');if(i){i.focus();i.setSelectionRange(t.value.length,t.value.length)}},'brand-search')}
  else if(t.id==='net-search'){STATE.rosterFilter.search=t.value;debounce(()=>{render();const i=$('#net-search');if(i){i.focus();i.setSelectionRange(t.value.length,t.value.length)}},'net-search')}
  else if(t.dataset.act==='op-roster-active'){STATE.rosterFilter.activeOnly=t.checked;render()}
  else if(t.dataset.act==='dm-typing'){
    const slot=$('#dm-typing-slot');if(!slot)return;
    if(t.value.trim()){
      clearTimeout(window._dmTypeTimer);
      const other=STATE.creators[STATE.dmThreads[STATE.openDmThread].participants.find(x=>x!=='sofia')];
      slot.innerHTML=`<div class="msg bot" style="font-style:italic;opacity:.7">${esc(other.name.split(' ')[0])} is typing…</div>`;
      window._dmTypeTimer=setTimeout(()=>{slot.innerHTML=''},2000);
    }
  }
}
function handleKeydown(e){
  if(e.key==='Enter'){
    const t=e.target;
    if(t.id==='chat-input'){e.preventDefault();sendChat()}
    else if(t.id==='dm-input'){
      e.preventDefault();
      const k=STATE.openDmThread;if(!k)return;
      const text=t.value.trim();if(!text)return;
      const time=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      STATE.dmThreads[k].messages.push({from:'sofia',content:text,time,read:true});
      t.value='';render();
    }
  }
}

/* ===== CHAT — babyg replies with tool calls ===== */
function babygReply(q){
  const s=q.toLowerCase();const c=STATE.creators.sofia;const r=marketRate(c);const last=c.performance[c.performance.length-1];
  if(/book|reserve|table|restaurant/.test(s)) return {tool:'Searching Resy for venue availability', text:`On it. Komodo has 8:00 PM and 8:30 PM Friday for 4. Want me to hold the 8 PM? I'll add it to your calendar once you confirm.`};
  if(/remind/.test(s)) return {text:'Reminder set ✓ I\'ll push you 30 minutes before — text + push notification.'};
  if(/calendar|schedule|what.s on|whats on|week/.test(s)) return {text:'This week:\n\n• Tonight Syntax Rooftop 6:30 PM\n• Friday Aesop call 12:30 PM\n• Saturday Le Jardin 7 PM\n• Monday wellness co-post with Nia 9 AM'};
  if(/email|brand email|inbox/.test(s)) return {tool:'Reading Gmail · 2 brand emails found', text:'Aesop asked about your rate. Zara reached out about gifting. Want me to draft replies?'};
  if(/engagement|stats|er/.test(s)) return {text:`Your engagement rate is ${c.engagementRate}% this week, up from ${c.baselineEngagement}% baseline. Industry avg for lifestyle micro-creators is 3-5% — you're performing above average.`};
  if(/follower/.test(s)) return {text:`You're at ${fmt(c.followers)} this week. Growth +${fmt(last.followerDelta)} this month — about 2.6% monthly, strong for your niche without ads.`};
  if(/draft|caption|write/.test(s)) return {text:`Here's one in your voice:\n\n"west corner. golden hour. no caption needed."\n\nWant something longer?`};
  if(/aesop|deal|negotiate/.test(s)) return {text:`Flagging that to your manager — brand deal negotiation is their lane. At your engagement rate your market rate for a luxury skincare Reel is $${fmt(r.reelLow)}-$${fmt(r.reelHigh)}. The $1,800 offer is below market.`};
  if(/rate|worth|charge/.test(s)) return {text:`At ${fmt(c.followers)} followers and ${c.engagementRate}% engagement:\n\n• Reel: $${fmt(r.reelLow)}-$${fmt(r.reelHigh)}\n• Static: $${fmt(r.reelLow*.55|0)}-$${fmt(r.reelHigh*.55|0)}\n• Story bundle: $${fmt(r.reelLow*.4|0)}-$${fmt(r.reelHigh*.4|0)}\n\nLuxury and wellness commands a 15-20% premium.`};
  if(/dm|message nia|draft dm/.test(s)) return {text:'Here\'s a draft for Nia:\n\n"Hey, I\'m in for the morning series. 4 posts, alternating accounts, morning routine format. Free for a call Thursday?"\n\nWant to edit before sending?'};
  if(/flight/.test(s)) return {tool:'Searching Duffel for flight availability', text:'Found 3 options Miami → NYC Thursday morning:\n\n• American 7:45 AM — $247\n• Delta 8:30 AM — $219\n• United 9:15 AM — $198\n\nWhich one? I need confirmation before purchasing.'};
  if(/limit|message|how many/.test(s)) return {text:`You've used ${c.messagesUsedToday} of your ${c.dailyMessageLimit} daily messages on Pro. Resets at midnight. Pro gives you 150 messages and 40 agent actions per day.`};
  if(/post|film|content|what should/.test(s)){const intel=STATE.intelPosts.find(p=>p.targetNiches.includes(c.niche));if(intel)return {text:`Top of your feed: ${intel.title}\n\n${intel.body.slice(0,180)}…\n\nWant me to add it to your calendar?`};return {text:'Default play for your niche: morning routine in 60 seconds, slow B-roll, natural light. Post 7-9 AM.'}}
  if(/trend/.test(s)) return {text:'Right now: slow morning content is +34% above nightlife this week across the roster. Brunch culture is hitting. Anything golden hour with a wide skyline shot is overperforming.'};
  if(/prep|tonight/.test(s)) return {text:'Tonight: Syntax Rooftop 6:30 PM. Arrive by 6:15 for the west corner. 30-45s Reel, no talking, slightly underexposed. Post 7-9 PM. Caption can be one line.'};
  if(/hi|hello|hey|morning|sup/.test(s)) return {text:`Hey ${c.name.split(' ')[0]} ☀ I've got eyes on your schedule, stats, and the city. What do you need sorted?`};
  return {text:'Got it, I am on it. Anything else you need sorted before tonight?'};
}
function sendChat(){
  const i=$('#chat-input');if(!i||!i.value.trim())return;
  const c=STATE.creators.sofia;
  const text=i.value.trim();
  const time=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  STATE.messages[c.id].push({id:'m'+Date.now(),role:'user',content:text,time});
  c.messagesUsedToday=Math.min(c.dailyMessageLimit,c.messagesUsedToday+1);
  i.value='';render();
  setTimeout(()=>{
    const m=$('#chat-msgs');if(!m)return;
    const typ=document.createElement('div');typ.className='typing';typ.innerHTML='<span></span><span></span><span></span>';m.appendChild(typ);m.scrollTop=m.scrollHeight;
    setTimeout(()=>{
      typ.remove();
      const reply=babygReply(text);
      const el=document.createElement('div');el.className='msg bot';
      if(reply.tool){const tc=document.createElement('div');tc.className='toolcall';tc.textContent=reply.tool;el.appendChild(tc)}
      const span=document.createElement('span');el.appendChild(span);
      m.appendChild(el);
      const words=reply.text.split(' ');let idx=0;
      const tick=()=>{if(idx>=words.length){STATE.messages[c.id].push({id:'m'+Date.now(),role:'bot',content:reply.text,time:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),toolCall:reply.tool});return}span.textContent=words.slice(0,idx+1).join(' ');m.scrollTop=m.scrollHeight;idx++;setTimeout(tick,35)};
      tick();
    },1300);
  },80);
}

    <div style="font-size:12.5px;color:var(--txt2);margin-bottom:13px">Tell us what's wrong. babyg's moderation team reviews within 24 hours.</div>

}

    <div style="font-size:13px;color:var(--txt2);line-height:1.5;margin-bottom:18px">${esc(body)}</div>

  </div>`;
}

  const c=STATE.creators[id];
  return `<div class="modal" onclick="event.stopPropagation()">

    <div style="margin-top:10px"><label class="label">Handle</label><input class="input" id="ec-handle" value="${esc(c.handle)}" /></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px"><div><label class="label">Niche</label><select class="select" id="ec-niche">${NICHES_SHORT.map(n=>`<option ${c.niche===n?'selected':''}>${esc(n)}</option>`).join('')}</select></div><div><label class="label">Tier</label><select class="select" id="ec-tier"><option value="basic" ${c.tier==='basic'?'selected':''}>Basic</option><option value="pro" ${c.tier==='pro'?'selected':''}>Pro</option><option value="vip" ${c.tier==='vip'?'selected':''}>VIP</option></select></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px"><div><label class="label">City</label><input class="input" id="ec-city" value="${esc(c.city)}" /></div><div><label class="label">Neighborhood</label><input class="input" id="ec-hood" value="${esc(c.neighborhood)}" /></div></div>
    <div style="margin-top:10px"><label class="label">Bio</label><textarea class="textarea" id="ec-bio">${esc(c.bio)}</textarea></div>
    <div style="margin-top:10px"><label class="toggle"><input type="checkbox" id="ec-active" ${c.active?'checked':''} /><span class="switch"></span>Active</label></div>

  </div>`;
}
function renderAddCreatorModal(){

}
