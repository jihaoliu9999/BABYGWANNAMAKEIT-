<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>babyg — the missing system between your lifestyle and your results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,500;1,600;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080B;--s1:#0C1018;--s2:#121820;--s3:#1A2230;
  --lime:#B8FF4E;--cyan:#4EFFE0;--pink:#FF4EB8;--amber:#FFB84E;--blue:#4E9FFF;--red:#FF5C5C;
  --txt:#ECF0F5;--txt2:#8899AA;--txt3:#4A5568;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:'Outfit',system-ui,sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
input,textarea,select{font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}
::selection{background:var(--lime);color:#000}
.mono{font-family:'JetBrains Mono',monospace}
.italic{font-family:'Playfair Display',serif;font-style:italic;font-weight:500;letter-spacing:-.01em}
:focus-visible{outline:2px solid var(--lime);outline-offset:2px;border-radius:4px}

/* ===== Demo Navigation (always visible top-right, OUTSIDE app shell) ===== */
.demo-nav{position:fixed;top:14px;right:14px;z-index:500;background:rgba(12,16,24,.92);backdrop-filter:blur(14px);border:1px solid var(--border2);border-radius:12px;padding:8px;display:flex;flex-direction:column;gap:4px;min-width:160px}
.demo-nav-label{font-size:9px;color:var(--txt3);letter-spacing:.22em;text-transform:uppercase;font-weight:700;padding:3px 8px 5px;text-align:center;border-bottom:1px solid var(--border)}
.demo-nav-row{display:flex;gap:3px}
.demo-nav-btn{flex:1;padding:6px 9px;font-size:10.5px;font-weight:600;color:var(--txt2);background:transparent;border:1px solid transparent;border-radius:7px;letter-spacing:.04em;cursor:pointer;transition:.15s;white-space:nowrap}
.demo-nav-btn:hover{background:var(--s2);color:var(--txt)}
.demo-nav-btn.active{background:var(--s3);color:var(--lime);border-color:var(--lime)}
@media (max-width:640px){.demo-nav{top:8px;right:8px;min-width:auto}.demo-nav-btn{font-size:9.5px;padding:5px 7px}}

/* ===== Entry / Landing ===== */
.entry-shell{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center}
.landing-logo{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:54px;color:var(--lime);letter-spacing:-.03em;line-height:1;margin-bottom:6px}
.landing-tag{font-size:14px;color:var(--txt2);letter-spacing:.04em;margin-bottom:60px}
.landing-hero{max-width:760px;margin:0 auto 40px}
.landing-h1{font-family:'Outfit',sans-serif;font-size:clamp(38px,7vw,72px);font-weight:700;letter-spacing:-.04em;line-height:1.05;color:var(--txt)}
.landing-h1 .accent{color:var(--lime);font-family:'Playfair Display',serif;font-style:italic;font-weight:600}
.landing-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:760px;margin:36px auto 38px}
.landing-col{background:var(--s1);border:1px solid var(--border);border-left:3px solid var(--lime);padding:22px;border-radius:12px;text-align:left}
.landing-col.brand{border-left-color:var(--blue)}
.landing-col-h{font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--lime);font-weight:700;margin-bottom:8px}
.landing-col.brand .landing-col-h{color:var(--blue)}
.landing-col-body{font-size:14px;color:var(--txt2);line-height:1.55}
.landing-ctas{display:flex;gap:12px;justify-content:center;margin-top:8px}
.landing-admin{margin-top:50px;font-size:10.5px;color:var(--txt3);letter-spacing:.12em;text-transform:uppercase;cursor:pointer;opacity:.55;transition:.15s}
.landing-admin:hover{opacity:1;color:var(--txt2)}
@media (max-width:640px){.landing-cols{grid-template-columns:1fr}}

/* Account type selection */
.acct-shell{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 22px}
.acct-h{font-family:'Playfair Display',serif;font-style:italic;font-weight:600;font-size:36px;color:var(--txt);margin-bottom:8px;text-align:center;letter-spacing:-.02em}
.acct-sub{font-size:14px;color:var(--txt2);margin-bottom:40px;text-align:center}
.acct-cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:760px;width:100%}
.acct-card{background:var(--s1);border:2px solid var(--border);border-radius:14px;padding:32px 24px;cursor:pointer;transition:.18s;text-align:left;display:flex;flex-direction:column;gap:14px}
.acct-card.creator{border-color:rgba(184,255,78,.4)}
.acct-card.brand{border-color:rgba(78,159,255,.4)}
.acct-card:hover{transform:translateY(-2px)}
.acct-card.creator:hover{border-color:var(--lime);box-shadow:0 0 0 3px rgba(184,255,78,.08)}
.acct-card.brand:hover{border-color:var(--blue);box-shadow:0 0 0 3px rgba(78,159,255,.08)}
.acct-icon{width:42px;height:42px;border-radius:10px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:20px}
.acct-card.creator .acct-icon{color:var(--lime)}
.acct-card.brand .acct-icon{color:var(--blue)}
.acct-name{font-size:20px;font-weight:700;letter-spacing:-.01em}
.acct-card-body{font-size:13px;color:var(--txt2);line-height:1.55}
@media (max-width:640px){.acct-cards{grid-template-columns:1fr}}

/* ===== Onboarding ===== */
.onb-shell{min-height:100vh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;padding:18px 22px 40px}
.onb-bar{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.onb-back{width:32px;height:32px;border-radius:8px;background:var(--s2);border:1px solid var(--border);color:var(--txt2);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.onb-back:hover{background:var(--s3);color:var(--txt)}
.onb-progress{flex:1;height:3px;background:var(--s2);border-radius:99px;overflow:hidden}
.onb-progress-fill{height:100%;background:var(--lime);border-radius:99px;transition:width .35s}
.onb-skip{font-size:11px;color:var(--txt3);cursor:pointer;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.onb-step{display:flex;flex-direction:column;gap:18px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.onb-h{font-family:'Playfair Display',serif;font-style:italic;font-weight:600;font-size:30px;letter-spacing:-.02em;line-height:1.15}
.onb-sub{font-size:13.5px;color:var(--txt2);line-height:1.55;margin-top:-8px;margin-bottom:8px}
.onb-section-h{font-size:11px;color:var(--txt3);letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-top:18px;margin-bottom:9px}
.onb-section-h.pink{color:var(--pink)}
.onb-photo{width:100px;height:100px;border-radius:50%;background:var(--s2);border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--txt3);cursor:pointer;margin:0 auto 14px;transition:.15s}
.onb-photo:hover{border-color:var(--lime);color:var(--lime)}
.onb-photo.connected{background:linear-gradient(135deg,#B8FF4E,#4EFFE0);color:#000;border-style:solid;border-color:var(--lime)}
.onb-cta-row{display:flex;gap:10px;margin-top:12px}
.onb-cta-row .btn{flex:1}
.onb-fullscreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:18px}
.onb-fullscreen .landing-logo{font-size:64px;margin-bottom:6px}
.onb-conn-card{display:flex;align-items:center;gap:13px;padding:13px;background:var(--s1);border:1px solid var(--border);border-radius:10px}
.onb-conn-icon{width:36px;height:36px;border-radius:8px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--txt2);flex-shrink:0}
.onb-conn-meta{flex:1;min-width:0}
.onb-conn-name{font-size:13px;font-weight:600}
.onb-conn-detail{font-size:11px;color:var(--txt3);margin-top:2px}
.bot-preview{background:var(--s1);border:1px solid var(--border);border-left:3px solid var(--lime);border-radius:10px;padding:14px;font-size:13px;color:var(--txt2);font-style:italic;margin-top:6px}
.cap-preview{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:13px;font-size:13px;color:var(--txt);line-height:1.55;margin-top:8px;font-style:italic}
.cap-preview .l{font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.14em;font-weight:700;margin-bottom:5px;font-style:normal}
.typewriter{font-size:16px;color:var(--txt);line-height:1.65;max-width:360px;margin:0 auto;min-height:140px;text-align:left}
.typewriter::after{content:'▍';color:var(--lime);animation:blink 1s infinite}
@keyframes blink{50%{opacity:0}}
.welcome-av{width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,#B8FF4E,#4EFFE0);display:flex;align-items:center;justify-content:center;color:#000;font-size:34px;font-weight:700;margin:0 auto 18px}

/* ===== Common components ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;border:1px solid transparent;white-space:nowrap}
.btn.primary{background:var(--lime);color:#000}
.btn.primary:hover{background:#cdff7a;transform:translateY(-1px)}
.btn.blue{background:var(--blue);color:#000}
.btn.blue:hover{background:#7eb6ff;transform:translateY(-1px)}
.btn.ghost{background:var(--s2);color:var(--txt);border-color:var(--border2)}
.btn.ghost:hover{background:var(--s3)}
.btn.danger{background:rgba(255,92,92,.12);color:var(--red);border-color:rgba(255,92,92,.3)}
.btn.danger:hover{background:rgba(255,92,92,.22)}
.btn.lg{padding:14px 24px;font-size:14.5px}
.btn.sm{padding:7px 12px;font-size:11.5px}
.btn.full{width:100%}

.input,.textarea,.select{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--txt);font-size:14px;font-family:inherit;transition:.15s}
.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--lime);background:var(--s3)}
.textarea{resize:vertical;min-height:90px;line-height:1.5}
.label{display:block;font-size:10px;color:var(--txt2);font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:7px}

.pill-grid{display:flex;flex-wrap:wrap;gap:7px}
.pill{padding:8px 14px;background:var(--s2);border:1px solid var(--border);border-radius:999px;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;transition:.15s;user-select:none}
.pill:hover{border-color:var(--border2);color:var(--txt)}
.pill.on{background:var(--lime);color:#000;border-color:var(--lime);font-weight:600}
.pill.on.cyan{background:var(--cyan);border-color:var(--cyan)}
.pill.on.pink{background:var(--pink);border-color:var(--pink);color:#000}
.pill.on.amber{background:var(--amber);border-color:var(--amber);color:#000}
.pill.on.blue{background:var(--blue);border-color:var(--blue);color:#000}

.range-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
@media (min-width:640px){.range-row{grid-template-columns:1fr 1fr 1fr 1fr 1fr}}
.range-opt{padding:11px 8px;background:var(--s2);border:1px solid var(--border);border-radius:8px;font-size:11.5px;font-weight:600;color:var(--txt2);text-align:center;cursor:pointer;transition:.15s}
.range-opt:hover{border-color:var(--border2);color:var(--txt)}
.range-opt.on{background:var(--lime);color:#000;border-color:var(--lime)}

.toggle{position:relative;display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;color:var(--txt)}
.toggle input{display:none}
.switch{width:32px;height:18px;background:var(--s3);border-radius:99px;position:relative;transition:.2s;border:1px solid var(--border);flex-shrink:0}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;background:var(--txt2);border-radius:50%;transition:.2s}
.toggle input:checked + .switch{background:var(--lime);border-color:var(--lime)}
.toggle input:checked + .switch::after{background:#000;left:16px}
/* Hard limit toggle: pink when on */
.toggle.limit input:checked + .switch{background:var(--pink);border-color:var(--pink)}
.toggle.limit input:checked + .switch::after{background:#000}

.av{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#000;font-weight:700;flex-shrink:0;font-family:'Outfit',sans-serif}
.tier{display:inline-block;font-size:9.5px;font-weight:700;padding:3px 7px;border-radius:999px;letter-spacing:.1em;text-transform:uppercase}
.tier.vip{background:rgba(255,184,78,.13);color:var(--amber);border:1px solid rgba(255,184,78,.28)}
.tier.pro{background:rgba(184,255,78,.13);color:var(--lime);border:1px solid rgba(184,255,78,.28)}
.tier.basic{background:rgba(136,153,170,.12);color:var(--txt2);border:1px solid rgba(136,153,170,.22)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;font-size:10.5px;font-weight:600;letter-spacing:.04em}
.chip.live{background:rgba(78,255,224,.1);color:var(--cyan);border:1px solid rgba(78,255,224,.25)}
.chip.live .dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:pulse 1.4s infinite}
.chip.amber{background:rgba(255,184,78,.1);color:var(--amber);border:1px solid rgba(255,184,78,.25)}
.chip.blue{background:rgba(78,159,255,.1);color:var(--blue);border:1px solid rgba(78,159,255,.25)}
.chip.muted{background:var(--s2);color:var(--txt2);border:1px solid var(--border)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.9)}}
.verified-badge{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--blue);color:#000;font-size:9px;font-weight:700;flex-shrink:0}

.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:10px}
.card-title{font-size:13.5px;font-weight:600;letter-spacing:-.01em}
.card-sub{font-size:10.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.14em;font-weight:600;margin-top:3px}

.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--lime)}
.stat-card.cyan::before{background:var(--cyan)}.stat-card.pink::before{background:var(--pink)}.stat-card.amber::before{background:var(--amber)}.stat-card.blue::before{background:var(--blue)}
.stat-label{font-size:10px;color:var(--txt3);letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-bottom:8px}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1}
.stat-value .u{font-size:14px;color:var(--txt2);margin-left:2px}
.stat-delta{font-size:11px;color:var(--lime);margin-top:6px;font-weight:500}

.insight{background:linear-gradient(135deg,rgba(78,159,255,.07),rgba(184,255,78,.03));border:1px solid var(--border2);border-left:3px solid var(--blue);padding:13px 15px;border-radius:11px;margin-bottom:18px;display:flex;gap:12px;font-size:12.5px;line-height:1.55;color:var(--txt2)}
.insight.lime{border-left-color:var(--lime);background:linear-gradient(135deg,rgba(184,255,78,.07),rgba(78,255,224,.03))}
.insight.amber{border-left-color:var(--amber);background:linear-gradient(135deg,rgba(255,184,78,.07),rgba(255,78,184,.03))}
.insight strong{color:var(--txt);font-weight:600}
.insight .ico{flex-shrink:0;width:24px;height:24px;border-radius:7px;background:var(--s3);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:12px;font-weight:700}
.insight.lime .ico{color:var(--lime)}
.insight.amber .ico{color:var(--amber)}

/* tables */
.table-wrap{overflow-x:auto;border-radius:11px}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{font-size:10px;color:var(--txt3);letter-spacing:.16em;text-transform:uppercase;text-align:left;padding:9px 10px;font-weight:600;border-bottom:1px solid var(--border)}
.table td{padding:11px 10px;border-bottom:1px solid var(--border)}
.table tr:last-child td{border-bottom:0}
.table tbody tr{cursor:pointer;transition:.12s}
.table tbody tr:hover td{background:var(--s2)}
.creator-cell{display:flex;align-items:center;gap:11px}
.cr-name{font-size:13px;font-weight:600;line-height:1.2}
.cr-meta{font-size:10.5px;color:var(--txt3);margin-top:2px}
.bar-cell{display:flex;align-items:center;gap:9px}
.bar{width:64px;height:4px;background:var(--s3);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;background:var(--lime);border-radius:99px;transition:width .6s}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 3px rgba(78,255,224,.15)}
.status-dot.idle{background:var(--txt3);box-shadow:0 0 0 3px rgba(74,85,104,.15)}

/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--s2);padding:4px;border-radius:10px;width:fit-content;border:1px solid var(--border);flex-wrap:wrap;max-width:100%}
.tab{padding:7px 13px;font-size:11.5px;font-weight:600;color:var(--txt2);border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab.active{background:var(--s3);color:var(--txt)}
.tab .count{font-family:'JetBrains Mono',monospace;font-size:9.5px;background:var(--s3);padding:1px 6px;border-radius:99px;color:var(--txt2)}
.tab.active .count{background:var(--pink);color:#000}

/* sidebar app shell (op + brand) */
.app-shell{display:grid;grid-template-columns:200px 1fr;min-height:100vh}
.sidebar{background:var(--s1);border-right:1px solid var(--border);padding:18px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px;z-index:50}
.sidebar-logo{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:28px;color:var(--lime);padding:0 8px 16px;letter-spacing:-.02em;line-height:1}
.sidebar-logo small{display:block;font-family:'Outfit',sans-serif;font-style:normal;font-weight:600;font-size:9px;color:var(--txt3);letter-spacing:.22em;text-transform:uppercase;margin-top:6px}
.sidebar-section{font-size:9px;color:var(--txt3);letter-spacing:.22em;text-transform:uppercase;padding:14px 8px 6px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:8px;color:var(--txt2);font-size:13px;font-weight:500;cursor:pointer;transition:.15s}
.nav-item:hover{background:var(--s2);color:var(--txt)}
.nav-item.active{background:rgba(184,255,78,.08);color:var(--lime)}
.nav-item.brand-active{background:rgba(78,159,255,.08);color:var(--blue)}
.nav-item .ico{width:16px;text-align:center;flex-shrink:0;font-size:13px}
.nav-item .badge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9.5px;background:var(--pink);color:#000;padding:1px 6px;border-radius:8px;font-weight:700}
.nav-item .badge.amber{background:var(--amber)}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;gap:8px}
.sidebar-user{display:flex;align-items:center;gap:9px;padding:9px;background:var(--s2);border-radius:10px;border:1px solid var(--border)}
.sidebar-user-meta{display:flex;flex-direction:column;min-width:0;flex:1}
.sidebar-user-meta .n{font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user-meta .r{font-size:9px;color:var(--txt3);letter-spacing:.14em;text-transform:uppercase}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 22px 12px 22px;border-bottom:1px solid var(--border);background:rgba(6,8,11,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:40;height:62px;padding-right:200px /* leave room for demo nav */}
.title{font-size:19px;font-weight:700;letter-spacing:-.02em}
.subtitle{font-size:11px;color:var(--txt2);margin-top:2px}
.title-wrap{display:flex;flex-direction:column;min-width:0}
.spacer{flex:1}
.bell{position:relative;width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--txt2)}
.bell:hover{color:var(--txt);background:var(--s3)}
.bell .badge-c{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:99px;background:var(--pink);color:#000;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace}
.notif-panel{position:absolute;top:calc(100% + 8px);right:22px;width:340px;background:var(--s1);border:1px solid var(--border2);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.6);z-index:60;display:none;overflow:hidden}
.notif-panel.open{display:block}
.notif-head{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border)}
.notif-item{display:flex;gap:11px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.notif-item:last-child{border-bottom:0}
.notif-item.unread{background:rgba(184,255,78,.04)}
.notif-item:hover{background:var(--s2)}
.notif-ico{width:28px;height:28px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.notif-body{flex:1;font-size:12.5px;line-height:1.4}
.notif-body small{display:block;color:var(--txt3);font-size:10.5px;margin-top:3px}
.content-area{padding:22px;max-width:1280px;margin:0 auto;width:100%;flex:1;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ===== Creator Phone Frame ===== */
.creator-stage{padding:30px 16px 30px;display:flex;justify-content:center;min-height:100vh;background:var(--bg)}
.phone-frame{width:100%;max-width:390px;background:var(--bg);border:1px solid var(--border2);border-radius:32px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 7px #1a1a1a;display:flex;flex-direction:column;min-height:780px;position:relative}
.cr-status{display:flex;justify-content:space-between;align-items:center;padding:14px 22px 6px;font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--txt2)}
.cr-content{padding:0 16px 90px;flex:1;overflow-y:auto;min-height:560px}
.cr-tabbar{position:sticky;bottom:0;background:rgba(12,16,24,.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(6,1fr);padding:7px 4px 12px}
.cr-tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 3px;color:var(--txt3);font-size:9.5px;letter-spacing:.04em;border-radius:8px;cursor:pointer;position:relative;background:none;border:0}
.cr-tab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.cr-tab.active{color:var(--lime)}
.cr-header{padding:18px 4px 14px}
.cr-greet{font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:var(--txt3);font-weight:700}
.cr-name-big{font-family:'Playfair Display',serif;font-style:italic;font-size:32px;font-weight:600;margin-top:4px;letter-spacing:-.02em}
.cr-sub{font-size:12.5px;color:var(--txt2);margin-top:6px}
.cr-sub b{color:var(--lime);font-weight:600}

/* usage counter */
.usage-card{background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:14px}
.usage-row{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;margin-bottom:7px}
.usage-row .l{color:var(--txt2)}
.usage-row .v{font-family:'JetBrains Mono',monospace;color:var(--txt);font-weight:600}
.usage-bar{height:3px;background:var(--s3);border-radius:99px;overflow:hidden}
.usage-bar-fill{height:100%;background:var(--lime);border-radius:99px;transition:width .35s}
.usage-bar-fill.amber{background:var(--amber)}
.usage-bar-fill.pink{background:var(--pink)}
.usage-warn{margin-top:8px;padding:9px 11px;background:rgba(255,184,78,.08);border:1px solid rgba(255,184,78,.2);border-radius:8px;font-size:11px;color:var(--amber)}
.usage-warn.pink{background:rgba(255,78,184,.08);border-color:rgba(255,78,184,.2);color:var(--pink)}

/* feed cards */
.feed-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:11px;border-left:3px solid var(--cyan);cursor:pointer;transition:.2s;position:relative}
.feed-card.unread::before{content:'';position:absolute;top:13px;right:13px;width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 3px rgba(184,255,78,.2)}
.feed-card.trend{border-left-color:var(--amber)}
.feed-card.brand{border-left-color:var(--pink)}
.feed-card.collab{border-left-color:var(--cyan)}
.feed-card.alert{border-left-color:var(--red)}
.feed-cat{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin-bottom:5px}
.feed-card.trend .feed-cat{color:var(--amber)}
.feed-card.brand .feed-cat{color:var(--pink)}
.feed-card.collab .feed-cat{color:var(--cyan)}
.feed-card.alert .feed-cat{color:var(--red)}
.feed-title{font-size:13.5px;font-weight:600;line-height:1.35;padding-right:18px}
.feed-time{font-size:10.5px;color:var(--txt3);margin-top:5px;font-family:'JetBrains Mono',monospace}
.feed-decay{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:5px;background:rgba(255,184,78,.12);color:var(--amber);margin-left:7px}
.feed-expand{display:none;margin-top:13px;padding-top:13px;border-top:1px solid var(--border);font-size:12.5px;line-height:1.6;color:var(--txt2)}
.feed-card.open .feed-expand{display:block}
.feed-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:11px 0;background:var(--s2);padding:11px;border-radius:9px}
.feed-meta-grid .k{font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.feed-meta-grid .v{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--txt);font-weight:600;margin-top:2px}
.feed-actions{display:flex;gap:6px;margin-bottom:9px}
.feed-actions .btn{flex:1}
.feed-fb{display:flex;gap:5px;margin-top:9px}
.fb-btn{flex:1;padding:7px;background:var(--s2);border:1px solid var(--border);border-radius:7px;font-size:10.5px;font-weight:600;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.fb-btn:hover{color:var(--txt);border-color:var(--border2)}
.fb-btn.on{background:var(--lime);color:#000;border-color:var(--lime)}
.fb-btn.on.bad{background:var(--red);color:#fff;border-color:var(--red)}
.fb-btn.on.act{background:var(--cyan);color:#000;border-color:var(--cyan)}

/* chat */
.chat-head{display:flex;align-items:center;gap:11px;padding:14px 4px 14px;border-bottom:1px solid var(--border);margin-bottom:14px}
.chat-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--lime),var(--cyan));display:flex;align-items:center;justify-content:center;color:#000;font-size:18px;font-weight:700;position:relative;flex-shrink:0}
.chat-avatar::after{content:'';position:absolute;bottom:0;right:0;width:11px;height:11px;border-radius:50%;background:var(--cyan);border:2px solid var(--bg)}
.chat-meta .n{font-family:'Playfair Display',serif;font-style:italic;font-size:19px;font-weight:600}
.chat-meta .s{font-size:10.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.chat-status{font-size:10.5px;color:var(--cyan);margin-top:3px;display:flex;align-items:center;gap:5px}
.chat-status .d{width:5px;height:5px;background:var(--cyan);border-radius:50%}
.chat-msgs{max-height:380px;overflow-y:auto;padding:4px;display:flex;flex-direction:column;gap:11px}
.chat-msgs::-webkit-scrollbar{width:0}
.msg{max-width:82%;padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.5;white-space:pre-wrap}
.msg.bot{background:var(--s2);color:var(--txt);border-top-left-radius:4px;align-self:flex-start}
.msg.user{background:var(--lime);color:#000;border-top-right-radius:4px;align-self:flex-end;font-weight:500}
.msg.brand{background:rgba(78,159,255,.18);color:var(--txt);border:1px solid rgba(78,159,255,.3);border-top-right-radius:4px;align-self:flex-end}
.toolcall{font-size:11px;color:var(--txt3);font-style:italic;margin-bottom:6px;padding:5px 9px;background:rgba(78,159,255,.08);border-left:2px solid var(--blue);border-radius:4px}
.toolcall::before{content:'⚙ ';color:var(--blue);font-style:normal}
.typing{display:flex;gap:4px;padding:13px;background:var(--s2);border-radius:14px;border-top-left-radius:4px;align-self:flex-start;width:fit-content}
.typing span{width:6px;height:6px;background:var(--txt3);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.chat-quick{display:flex;gap:6px;padding:10px 4px;flex-wrap:wrap}
.chat-quick .pill{font-size:10.5px;padding:5px 10px}
.chat-input-wrap{display:flex;gap:7px;margin-top:8px;padding-top:10px;border-top:1px solid var(--border)}
.chat-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:10px 13px;color:var(--txt);font-size:13px}
.chat-input:focus{outline:none;border-color:var(--lime)}
.chat-send{width:40px;height:40px;border-radius:13px;background:var(--lime);color:#000;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0;border:0;cursor:pointer}
.draft-btn{margin-top:8px;width:100%;padding:9px;background:var(--s2);border:1px dashed var(--border2);color:var(--lime);border-radius:10px;font-size:11.5px;font-weight:600;cursor:pointer}

/* calendar */
.cal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 4px 16px}
.cal-month{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;font-weight:600}
.cal-nav{display:flex;gap:5px}
.cal-arrow{width:30px;height:30px;border-radius:8px;background:var(--s2);border:1px solid var(--border);color:var(--txt);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-dh{font-size:9.5px;font-weight:700;color:var(--txt3);text-align:center;letter-spacing:.1em;padding:5px 0}
.cal-day{aspect-ratio:1;background:var(--s2);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--txt2);position:relative}
.cal-day:hover{background:var(--s3);color:var(--txt)}
.cal-day.empty{visibility:hidden}
.cal-day.today{border-color:var(--lime);color:var(--lime);background:rgba(184,255,78,.06)}
.cal-day.sel{background:var(--lime);color:#000;border-color:var(--lime);font-weight:700}
.cal-dots{display:flex;gap:2px;margin-top:auto;padding-bottom:2px}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan)}
.cal-dot.pink{background:var(--pink)}.cal-dot.amber{background:var(--amber)}.cal-dot.lime{background:var(--lime)}
.agenda-h{font-size:11.5px;text-transform:uppercase;letter-spacing:.16em;color:var(--txt3);font-weight:700;margin-bottom:11px}
.agenda-item{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}
.agenda-item:last-child{border-bottom:0}
.agenda-item.cancelled .agenda-title{text-decoration:line-through;color:var(--txt3)}
.agenda-time{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--txt2);width:60px;flex-shrink:0;padding-top:2px}
.agenda-bar{width:3px;border-radius:2px;background:var(--cyan);flex-shrink:0}
.agenda-bar.pink{background:var(--pink)}.agenda-bar.amber{background:var(--amber)}.agenda-bar.lime{background:var(--lime)}
.agenda-body{flex:1;min-width:0}
.agenda-title{font-size:12.5px;font-weight:600}
.agenda-sub{font-size:10.5px;color:var(--txt3);margin-top:2px}
.agenda-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:5px;margin-top:5px}
.agenda-tag.cyan{background:rgba(78,255,224,.1);color:var(--cyan)}
.agenda-tag.pink{background:rgba(255,78,184,.1);color:var(--pink)}
.agenda-tag.amber{background:rgba(255,184,78,.1);color:var(--amber)}
.agenda-tag.lime{background:rgba(184,255,78,.1);color:var(--lime)}

/* network */
.net-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--s2);padding:3px;border-radius:9px;border:1px solid var(--border)}
.net-tab{flex:1;padding:7px;font-size:11px;font-weight:600;color:var(--txt2);border-radius:6px;cursor:pointer;text-align:center;background:none;border:0}
.net-tab.active{background:var(--s3);color:var(--txt)}
.net-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.net-card{background:var(--s1);border:1px solid var(--border);border-radius:11px;padding:13px;text-align:center;cursor:pointer;transition:.15s}
.net-card:hover{border-color:var(--border2)}
.net-name{font-size:12.5px;font-weight:600;margin-top:9px}
.net-handle{font-size:10.5px;color:var(--txt3);margin-top:1px;font-family:'JetBrains Mono',monospace}
.net-stats{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--txt2);margin-top:7px;display:flex;justify-content:center;gap:7px}
.net-stats b{color:var(--lime)}
.net-niche{font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;margin-top:3px;font-weight:600}
.net-overlap{font-size:10px;color:var(--cyan);margin-top:5px;font-weight:600}
.net-actions{display:flex;gap:5px;margin-top:9px}
.net-actions .btn{flex:1;padding:6px;font-size:10px}

/* job listing card */
.job-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px}
.job-poster{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--txt3);margin-bottom:8px}
.job-head{display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:6px}
.job-title{font-size:13.5px;font-weight:600;flex:1;line-height:1.3}
.job-rate{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--lime);font-weight:600;white-space:nowrap}
.job-desc{font-size:11.5px;color:var(--txt2);line-height:1.5;margin-bottom:9px}
.job-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.job-tag{background:var(--s3);color:var(--txt2);font-size:9.5px;padding:2px 7px;border-radius:99px;font-weight:500}
.job-meta{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;color:var(--txt3);margin-bottom:9px}
.job-actions{display:flex;gap:6px}
.job-actions .btn{flex:1;padding:7px;font-size:10.5px}
.job-actions .more{flex:0 0 32px;background:var(--s2);border:1px solid var(--border);border-radius:7px;color:var(--txt2);font-weight:700;cursor:pointer}

/* DM thread */
.dm-thread{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--border);cursor:pointer}
.dm-thread-body{flex:1;min-width:0}
.dm-thread-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px}
.dm-thread-msg{font-size:11.5px;color:var(--txt3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm-thread-meta{text-align:right;flex-shrink:0}
.dm-thread-time{font-size:10px;color:var(--txt3);font-family:'JetBrains Mono',monospace}
.dm-thread-badge{margin-top:4px;display:inline-block;background:var(--lime);color:#000;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:99px;font-family:'JetBrains Mono',monospace}

/* creator stats */
.cr-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.cr-stat{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:14px;border-top:2px solid var(--lime)}
.cr-stat.cyan{border-top-color:var(--cyan)}.cr-stat.pink{border-top-color:var(--pink)}.cr-stat.amber{border-top-color:var(--amber)}
.cr-stat .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--txt3);font-weight:600;margin-bottom:7px}
.cr-stat .v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600}
.cr-stat .v .u{font-size:13px;color:var(--txt2)}
.cr-stat .d{font-size:10.5px;color:var(--lime);margin-top:5px;font-weight:500}

/* mini chart */
.mini-chart{display:flex;align-items:flex-end;gap:5px;height:80px;margin-top:11px;padding-bottom:18px;border-bottom:1px dashed var(--border);position:relative}
.mini-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative}
.mini-bar{width:100%;background:rgba(184,255,78,.3);border-radius:3px 3px 0 0;height:0;transition:height .9s cubic-bezier(.2,.8,.2,1)}
.mini-bar.cur{background:var(--lime)}
.mini-bar.cyan{background:rgba(78,255,224,.3)}
.mini-bar.cyan.cur{background:var(--cyan)}
.mini-lbl{position:absolute;bottom:-16px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--txt3)}
.mini-launch{position:absolute;top:-2px;bottom:18px;border-left:1px dashed rgba(184,255,78,.4);font-size:8.5px;color:var(--lime);font-weight:700;padding-left:5px;letter-spacing:.1em;text-transform:uppercase}

/* big charts (analytics) */
.chart{display:flex;align-items:flex-end;gap:12px;height:180px;position:relative;padding-bottom:30px;border-bottom:1px dashed var(--border);margin-top:10px}
.chart-launch{position:absolute;top:0;bottom:30px;border-left:1px dashed rgba(184,255,78,.4);font-size:9px;color:var(--lime);font-weight:700;padding-left:6px;letter-spacing:.1em;text-transform:uppercase}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;position:relative;cursor:pointer}
.bar-bar{width:100%;max-width:36px;background:rgba(184,255,78,.3);border-radius:5px 5px 0 0;height:0;transition:height .9s cubic-bezier(.2,.8,.2,1);position:relative}
.bar-bar.cyan{background:rgba(78,255,224,.3)}
.bar-bar.cur{background:var(--lime)}
.bar-bar.cur.cyan{background:var(--cyan)}
.bar-tip{position:absolute;top:-32px;left:50%;transform:translateX(-50%);background:#000;border:1px solid var(--border2);padding:4px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--lime);font-weight:600;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s}
.bar-col:hover .bar-tip{opacity:1}
.bar-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt3);position:absolute;bottom:-22px;letter-spacing:.04em}

.ring{width:120px;height:120px;position:relative;margin:0 auto}
.ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring circle{fill:none;stroke-width:8}
.ring .bg{stroke:var(--s3)}
.ring .fg{stroke:var(--lime);stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.ring .v{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .v .n{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600}
.ring .v .l{font-size:9px;color:var(--txt3);letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-top:2px}

/* profile + settings cards */
.prof-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;margin-bottom:13px}
.prof-name{font-family:'Playfair Display',serif;font-style:italic;font-size:23px;font-weight:600}
.prof-handle{font-size:11.5px;color:var(--txt3);margin-top:3px;font-family:'JetBrains Mono',monospace}
.prof-niche{font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--lime);font-weight:600;margin-top:7px}
.prof-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.prof-stat .v{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600}
.prof-stat .l{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--txt3);font-weight:600;margin-top:3px}
.settings-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:13px}

function cloneVoice(samples){
  // Pick the first non-empty line, lowercase it, trim end punctuation
  const lines=samples.split('\n').map(s=>s.trim()).filter(Boolean);
  if(lines.length===0) return '';
  const first=lines[0].toLowerCase().replace(/[.!?]+$/,'');
  return first+'. nothing else needed.';
}

}

function renderCalendarGrid(){
  const grid=$('#cal-grid');if(!grid)return;
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames=['S','M','T','W','T','F','S'];
  let html=dayNames.map(d=>`<div class="cal-dh">${d}</div>`).join('');
  const first=new Date(STATE.selCalYear,STATE.selCalMonth,1);
  const startDay=first.getDay();
  const dim=new Date(STATE.selCalYear,STATE.selCalMonth+1,0).getDate();
  const today=(STATE.selCalYear===2026 && STATE.selCalMonth===3)?23:-1;
  const bks=STATE.bookings.sofia||[];
  for(let i=0;i<startDay;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const cls=[];
    if(d===today) cls.push('today');
    if(d===STATE.selCalDay) cls.push('sel');
    const dayBks=bks.filter(b=>{const bd=new Date(b.dateTime);return bd.getFullYear()===STATE.selCalYear && bd.getMonth()===STATE.selCalMonth && bd.getDate()===d});
    const types=[...new Set(dayBks.map(b=>bookingDot(b.type)))];
    html+=`<div class="cal-day ${cls.join(' ')}" data-act="cal-day" data-d="${d}"><span>${d}</span>${types.length?`<div class="cal-dots">${types.map(t=>`<div class="cal-dot ${t}"></div>`).join('')}</div>`:''}</div>`;
  }
  grid.innerHTML=html;
  renderAgenda();
}
function renderAgenda(){
  const head=$('#agenda-h');const body=$('#agenda-body');if(!head||!body)return;
  const bks=(STATE.bookings.sofia||[]).filter(b=>{const bd=new Date(b.dateTime);return bd.getFullYear()===STATE.selCalYear && bd.getMonth()===STATE.selCalMonth && bd.getDate()===STATE.selCalDay}).sort((a,b)=>new Date(a.dateTime)-new Date(b.dateTime));
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const date=new Date(STATE.selCalYear,STATE.selCalMonth,STATE.selCalDay);
  const isToday=(STATE.selCalYear===2026 && STATE.selCalMonth===3 && STATE.selCalDay===23);
  head.textContent=`${isToday?'Today · ':''}${dayNames[date.getDay()]} ${monthNames[STATE.selCalMonth]} ${STATE.selCalDay}`;
  if(bks.length===0){body.innerHTML=`<div style="text-align:center;color:var(--txt3);padding:24px 0;font-size:12.5px">Nothing on the calendar.</div>`;return}
  body.innerHTML=bks.map(b=>`
    <div class="agenda-item ${b.status==='cancelled'?'cancelled':''}" data-act="open-event" data-id="${b.id}">
      <div class="agenda-time">${timeFromIso(b.dateTime)}</div>

        <span class="agenda-tag ${bookingDot(b.type)}">${esc(b.type)} · ${esc(b.status)}</span>
      </div>
    </div>`).join('');
}

/* ===== OPERATOR: HOT DROPS ===== */
function renderOpHotDrop(){
  const c=STATE.composer;

  return `
    <div class="insight lime"><div class="ico">🔥</div><div>Hot Drops are the product. Push <strong>specific, sourced, time-bounded</strong> intelligence — venue openings, brand briefs, trend shifts. Generic posting tips kill trust. Last week's drop-to-action: <strong>34%</strong>.</div></div>
    <div class="card">
      <div class="card-head"><div><div class="card-title">${c.editingId?'Edit Hot Drop':'Compose Hot Drop'}</div><div class="card-sub">Publishes to creator feeds instantly</div></div>${c.editingId?`<button class="btn ghost sm" data-act="cancel-edit-drop">Cancel edit</button>`:''}</div>
      <div style="margin-bottom:13px"><label class="label">Title</label><input class="input" id="cmp-title" value="${esc(c.title)}" placeholder="Syntax rooftop — soft open tonight" /></div>
      <div style="margin-bottom:13px"><label class="label">Body</label><textarea class="textarea" id="cmp-body" placeholder="West corner has skyline + water at golden hour. Reel 6-8 PM. Post 7-9 PM.">${esc(c.body)}</textarea></div>
      <div style="margin-bottom:13px"><label class="label">Category</label>
        <div class="pill-grid">${['venue','trend','brand','collab','alert'].map(cat=>{const cls=cat==='venue'||cat==='collab'?'cyan':cat==='brand'?'pink':cat==='trend'?'amber':'';return `<span class="pill ${c.category===cat?'on '+cls:''}" data-act="cmp-cat" data-v="${cat}">${cat[0].toUpperCase()+cat.slice(1)}</span>`}).join('')}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:13px">
        <div><label class="label">Source</label><input class="input" id="cmp-source" value="${esc(c.source)}" placeholder="Maya · in-person" /></div>
        <div><label class="label">Confidence</label>
          <div class="pill-grid" style="gap:5px">${['low','medium','high'].map(v=>`<span class="pill ${c.confidence===v?'on':''}" data-act="cmp-conf" data-v="${v}">${v[0].toUpperCase()+v.slice(1)}</span>`).join('')}</div>
        </div>
        <div><label class="label">Valid Until</label><input class="input" type="datetime-local" id="cmp-valid" value="${esc(c.validUntil)}" /></div>
      </div>
      <div style="margin-bottom:13px"><label class="label">Target Niches</label>
        <div class="pill-grid">${NICHES_SHORT.map(n=>`<span class="pill ${c.niches.includes(n)?'on':''}" data-act="cmp-niche" data-v="${esc(n)}">${esc(n)}</span>`).join('')}</div>
      </div>
      <div style="margin-bottom:13px"><label class="label">Target Tiers</label>
        <div class="pill-grid">${['basic','pro','vip'].map(tr=>`<span class="pill ${c.tiers.includes(tr)?'on '+(tr==='vip'?'amber':''):''}" data-act="cmp-tier" data-v="${tr}">${tr.toUpperCase()}</span>`).join('')}</div>
      </div>
      <div style="margin-bottom:13px"><label class="label">City</label><input class="input" id="cmp-city" value="${esc(c.city)}" /></div>
      <div style="display:flex;gap:9px;align-items:center;flex-wrap:wrap">
        <button class="btn primary" data-act="cmp-publish">🔥 ${c.editingId?'Save Changes':'Drop It'}</button>
        <button class="btn ghost" data-act="cmp-preview">👁 Preview as Creator</button>
        <button class="btn ghost" data-act="cmp-draft">Save Draft</button>
        <span style="margin-left:auto;font-size:11.5px;color:var(--txt2)">Reaches <b style="color:var(--lime);font-family:'JetBrains Mono',monospace">${reach}</b> creator${reach===1?'':'s'}</span>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><div><div class="card-title">Hot Drop Library</div><div class="card-sub">${STATE.intelPosts.length} drops</div></div></div>
      <div class="filter-row">
        ${['all','venue','trend','brand','collab','alert'].map(k=>`<span class="pill ${STATE.dropFilter.category===k?'on':''}" data-act="drop-filter-cat" data-v="${k}">${k==='all'?'All':k[0].toUpperCase()+k.slice(1)}</span>`).join('')}
        <span style="width:1px;height:18px;background:var(--border);margin:0 4px"></span>
        ${['all','active','archived'].map(k=>`<span class="pill ${STATE.dropFilter.status===k?'on':''}" data-act="drop-filter-status" data-v="${k}">${k[0].toUpperCase()+k.slice(1)}</span>`).join('')}
      </div>
      ${filtered.map(p=>{const decay=p.isArchived?'arch':(new Date(p.validUntil)-Date.now() < 1000*60*60*48)?'exp':'active';return `
        <div class="intel-row">
          <span class="intel-cat cat-${p.category}">${p.category}</span>
          <div class="intel-body"><div class="intel-title">${esc(p.title)}</div><div class="intel-meta">${esc(p.source)} · valid ${new Date(p.validUntil).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</div></div>
          <div class="intel-stat"><b>${p.pushCount}</b> push · <b>${p.readCount}</b> read · <b>${p.actedOnCount}</b> acted</div>
          <span class="chip ${decay==='active'?'live':decay==='exp'?'amber':'muted'}" style="background:${decay==='arch'?'var(--s3)':''}">${p.isArchived?'Archived':decay==='exp'?'Expiring soon':'Active'}</span>
          <div class="intel-actions"><button class="btn ghost sm" data-act="drop-edit" data-id="${p.id}">Edit</button><button class="btn ghost sm" data-act="drop-arch" data-id="${p.id}">${p.isArchived?'Unarch':'Archive'}</button></div>
        </div>`}).join('')}
    </div>
  `;
}

/* ===== OPERATOR: ROSTER ===== */
function renderOpRoster(){
  const f=STATE.rosterFilter;
  const list=Object.values(STATE.creators).filter(c=>{
    if(f.activeOnly && !c.active) return false;
    if(f.tier!=='all' && c.tier!==f.tier) return false;
    if(f.niche!=='all' && c.niche!==f.niche) return false;
    if(f.search){const s=f.search.toLowerCase();if(!c.name.toLowerCase().includes(s)&&!c.handle.toLowerCase().includes(s)&&!c.niche.toLowerCase().includes(s))return false}
    return true;
  });
  return `

      <select class="select" style="width:auto" id="op-roster-tier" data-act="op-roster-tier">
        <option value="all" ${f.tier==='all'?'selected':''}>All tiers</option><option value="basic" ${f.tier==='basic'?'selected':''}>Basic</option><option value="pro" ${f.tier==='pro'?'selected':''}>Pro</option><option value="vip" ${f.tier==='vip'?'selected':''}>VIP</option>
      </select>

      </select>
      <label class="toggle"><input type="checkbox" ${f.activeOnly?'checked':''} data-act="op-roster-active" /><span class="switch"></span>Active only</label>
    </div>
    <div class="card" style="padding:6px 12px">
      <div class="table-wrap"><table class="table"><thead><tr><th>Creator</th><th>Followers</th><th>Engagement</th><th>Tier</th><th>Posts/wk</th><th>Status</th><th></th></tr></thead><tbody>
        ${list.map(c=>`<tr data-act="op-view-creator" data-id="${c.id}">
          <td><div class="creator-cell">${avatar(c,32)}<div><div class="cr-name">${esc(c.name)}</div><div class="cr-meta">${esc(c.niche)} · ${esc(c.neighborhood)} · ${esc(c.handle)}</div></div></div></td>
          <td class="mono">${fmt(c.followers)}</td>
          <td>${engBar(c.engagementRate)}</td>
          <td>${tierBadge(c.tier)}</td>
          <td class="mono">${c.postsPerWeek}</td>
          <td><span class="status-dot ${c.active?'':'idle'}"></span></td>

        </tr>`).join('')}
      </tbody></table></div>
    </div>
  `;
}

      <div class="card" style="margin:0;text-align:center;padding:14px"><div style="font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.14em;font-weight:700;margin-bottom:5px">Engagement</div><div style="font-family:'JetBrains Mono',monospace;font-size:13px"><span style="color:var(--txt3)">${c.baselineEngagement}%</span> → <b>${c.engagementRate}%</b></div><div style="font-size:11px;color:var(--lime);font-weight:600;margin-top:3px">+${erd}pp</div></div>

    </div>
    <div class="tabs">${tabs.map(k=>`<span class="tab ${tab===k?'active':''}" data-act="op-prof-tab" data-v="${k}">${k[0].toUpperCase()+k.slice(1)}</span>`).join('')}</div>

function renderOpProfileTab(c,tab){
  if(tab==='overview') return `
    <div class="card-head"><div class="card-title">Bio</div></div>
    <div style="font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:18px">${esc(c.bio)}</div>
    <div class="card-head"><div class="card-title">Writing voice</div></div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:18px">${(c.writingSamples||[]).map(v=>`<div style="font-size:12.5px;font-style:italic;color:var(--txt2);padding:9px;background:var(--s2);border-radius:8px">"${esc(v)}"</div>`).join('')}</div>
    ${(c.hardLimits||[]).length?`<div class="card-head"><div class="card-title" style="color:var(--pink)">Hard limits</div></div><div class="pill-grid" style="margin-bottom:18px">${c.hardLimits.map(l=>`<span class="pill on pink">${esc(l)}</span>`).join('')}</div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px"><div class="stat-card"><div class="stat-label">Active deals</div><div class="stat-value">${c.brandDealsActive}</div></div><div class="stat-card pink"><div class="stat-label">Monthly value</div><div class="stat-value">$${fmt(c.brandDealValue)}</div></div></div>
  `;
  if(tab==='messages'){
    const msgs=STATE.messages[c.id]||[];
    return msgs.length?msgs.slice().reverse().map(m=>`<div style="padding:11px;background:var(--s2);border-radius:10px;margin-bottom:7px;border-left:3px solid ${m.role==='bot'?'var(--lime)':'var(--blue)'}"><div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:5px">${m.role==='bot'?STATE.settings.botName:c.name} · ${esc(m.time)}</div><div style="font-size:13px;line-height:1.5;white-space:pre-wrap">${esc(m.content)}</div></div>`).join(''):`<div style="text-align:center;color:var(--txt3);padding:30px">No messages yet.</div>`;
  }
  if(tab==='bookings'){
    const bks=STATE.bookings[c.id]||[];
    return `<div class="card-head"><div class="card-title">${bks.length} bookings</div><button class="btn primary sm" data-act="op-add-booking" data-id="${c.id}">+ Add Booking</button></div>${bks.map(b=>`<div class="agenda-item"><div class="agenda-time">${timeFromIso(b.dateTime)}</div><div class="agenda-bar ${bookingDot(b.type)}"></div><div class="agenda-body"><div class="agenda-title">${esc(b.venue)}</div><div class="agenda-sub">${new Date(b.dateTime).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} · ${esc(b.notes)}</div><span class="agenda-tag ${bookingDot(b.type)}">${b.status}</span></div></div>`).join('')}`;
  }
  if(tab==='performance'){
    const p=c.performance||[];
    return `<div class="card-head"><div class="card-title">8-week performance</div><button class="btn primary sm" data-act="op-log-perf" data-id="${c.id}">+ Log Week</button></div>
    <div style="font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.14em;font-weight:600;margin:14px 0 8px">Posts / week</div>
    <div class="mini-chart" id="op-perf-posts" style="position:relative">${p.map((w,i)=>`<div class="mini-bar-col"><div class="mini-bar ${i===p.length-1?'cur':''}" style="height:0"></div><div class="mini-lbl">W${w.week}</div></div>`).join('')}</div>
    <div style="font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.14em;font-weight:600;margin:24px 0 8px">Engagement %</div>
    <div class="mini-chart" id="op-perf-er" style="position:relative">${p.map((w,i)=>`<div class="mini-bar-col"><div class="mini-bar cyan ${i===p.length-1?'cur':''}" style="height:0"></div><div class="mini-lbl">W${w.week}</div></div>`).join('')}</div>
    <div class="table-wrap" style="margin-top:24px"><table class="table"><thead><tr><th>Week</th><th>Posts</th><th>ER</th><th>Δ Followers</th><th>Deals</th><th>Value</th></tr></thead><tbody>${p.map(w=>`<tr><td class="mono">W${w.week}</td><td class="mono">${w.posts}</td><td class="mono">${w.engagement}%</td><td class="mono" style="color:var(--lime)">+${w.followerDelta}</td><td class="mono">${w.brandDeals}</td><td class="mono">$${fmt(w.brandValue)}</td></tr>`).join('')}</tbody></table></div>`;
  }
  if(tab==='notes'){
    const notes=STATE._opNotes?.[c.id]||[];
    return `<div class="card-head"><div class="card-title">Operator notes</div><div class="card-sub">${notes.length} entries</div></div>
    <textarea class="textarea" id="op-note-input" placeholder="Add a private note about ${esc(c.name)}…"></textarea>

  }
  if(tab==='receipts'){
    const r=c.receipts||[];

function buildChart(id,data,max,suffix,cyan){
  const el=document.getElementById(id);if(!el)return;
  el.querySelectorAll('.bar-col').forEach(x=>x.remove());
  data.forEach((v,i)=>{
    const col=document.createElement('div');col.className='bar-col';
    const cur=i===data.length-1;
    const bar=document.createElement('div');bar.className='bar-bar'+(cyan?' cyan':'')+(cur?' cur':'');bar.style.height='0';
    const tip=document.createElement('div');tip.className='bar-tip';tip.textContent='W'+(i+1)+': '+v+suffix;
    const lbl=document.createElement('div');lbl.className='bar-lbl';lbl.textContent='W'+(i+1);
    bar.appendChild(tip);col.appendChild(bar);col.appendChild(lbl);el.appendChild(col);
    setTimeout(()=>bar.style.height=((v/max)*100)+'%',60+i*70);
  });
}

  // Demo nav
  if(act==='demo-nav'){
    const v=t.dataset.v;
    if(v==='entry'){STATE.currentView='entry'}
    else if(v==='onboarding'){STATE.currentView='accountType'}
    else if(v==='creator'){STATE.currentView='creator'}
    else if(v==='brand'){STATE.currentView='brand'}
    else if(v==='operator'){STATE.currentView='operator'}
    render();return;
  }

  if(act==='login-modal'){openOverlay(`<div class="modal" onclick="event.stopPropagation()"><div class="modal-head"><div class="modal-title">Log in to babyg</div><button class="modal-close" data-act="close-overlay">×</button></div><div style="margin-bottom:14px"><label class="label">Email</label><input class="input" placeholder="sofia@example.com" /></div><button class="btn primary full" data-act="login-send">Send magic link</button></div>`);return}
  if(act==='login-send'){closeOverlay();toast('Magic link sent','Check your inbox to sign in','info');return}
  if(act==='admin-login'){STATE.currentView='operator';render();return}
  if(act==='start-onboard'){STATE.onboardingType=t.dataset.v;STATE.onboardingStep=0;STATE.currentView='onboarding';STATE.typewriterDone=false;render();return}
  if(act==='onb-next'){STATE.onboardingStep++;render();return}
  if(act==='onb-back'){STATE.onboardingStep=Math.max(0,STATE.onboardingStep-1);render();return}
  // creator onboarding
  if(act==='onb-photo'){const el=$('#onb-photo')||t;el.classList.add('connected');el.textContent='✓';return}
  if(act==='onb-step1-next'){const d=STATE.onboardingDraft;d.name=$('#onb-name').value||'Sofia L.';d.handle=$('#onb-handle').value||'@sofialux';d.city=$('#onb-city').value;STATE.onboardingStep++;render();return}
  if(act==='onb-toggle-niche'){const v=t.dataset.v;const a=STATE.onboardingDraft.niches;const i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);render();return}
  if(act==='onb-toggle-format'){const v=t.dataset.v;const a=STATE.onboardingDraft.formats;const i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);render();return}
  if(act==='onb-set-followers'){STATE.onboardingDraft.followers=t.dataset.v;render();return}
  if(act==='onb-set-er'){STATE.onboardingDraft.er=t.dataset.v;render();return}
  if(act==='onb-set-since'){STATE.onboardingDraft.since=t.dataset.v;render();return}
  if(act==='onb-set-primary'){STATE.onboardingDraft.primary=t.dataset.v;render();return}
  if(act==='onb-toggle-life'){const v=t.dataset.v;const a=STATE.onboardingDraft.lifestyle;const i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);render();return}
  if(act==='onb-toggle-brandpref'){const v=t.dataset.v;const a=STATE.onboardingDraft.brandPrefs;const i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);render();return}
  if(act==='onb-toggle-limit'){const v=t.dataset.v;const a=STATE.onboardingDraft.hardLimits;const i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);return}
  if(act==='onb-toggle-conn'){const k=t.dataset.k;STATE._onbConn=STATE._onbConn||{};STATE._onbConn[k]=!STATE._onbConn[k];render();return}
  if(act==='onb-finish-creator'){
    // commit minimal onboarding to STATE; for demo we just go to creator view
    const d=STATE.onboardingDraft;
    if(d.botName) STATE.settings.botName=d.botName;
    STATE.currentView='creator';STATE.creatorPanel='feed';
    toast('Welcome to babyg',`Hey ${(d.name||'Sofia').split(' ')[0]} — let's go.`);
    render();return;
  }
  // brand onboarding
  if(act==='bonb-step1-next'){const d=STATE.brandOnboardDraft;d.name=$('#bonb-name').value;d.site=$('#bonb-site').value;d.industry=$('#bonb-industry').value;d.contact=$('#bonb-contact').value;d.title=$('#bonb-title').value;STATE.onboardingStep++;render();return}
  if(act==='bonb-toggle'){const k=t.dataset.k;const v=t.dataset.v;const a=STATE.brandOnboardDraft[k];const i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);render();return}
  if(act==='bonb-csize'){const a=STATE.brandOnboardDraft.creatorSize;const v=t.dataset.v;const i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);render();return}
  if(act==='bonb-budget'){STATE.brandOnboardDraft.budget=t.dataset.v;render();return}
  if(act==='onb-finish-brand'){STATE.currentView='brand';STATE.brandPanel='discover';toast('Welcome to babyg','Browse creators while we verify your account','info');render();return}
  if(act==='close-overlay'){closeOverlay();return}
  if(act==='close-sheet'){closeSheet();return}

  // dispatch to extended handler (filled in next part)
  if(typeof handleAction==='function') handleAction(act,t,e);
});

document.addEventListener('input',e=>{
  const t=e.target;
  if(t.id==='onb-samples'){STATE.onboardingDraft.samples=t.value;const prev=document.querySelector('.cap-preview');if(prev){prev.innerHTML=`<div class="l">Live preview — babyg writes like this</div>${esc(cloneVoice(t.value)||'morning light hits different. just facts.')}`}}
  else if(t.id==='onb-botname'){STATE.onboardingDraft.botName=t.value||'babyg';const p=$('#botname-preview');if(p)p.innerHTML=`Hi ${esc((STATE.onboardingDraft.name||'Sofia').split(' ')[0])}, I'm <b style="color:var(--lime);font-style:normal">${esc(STATE.onboardingDraft.botName)}</b> — your social media manager.`}
  else if(t.id==='bonb-desc'){STATE.brandOnboardDraft.desc=t.value;const c=t.parentElement.querySelector('div[style*="text-align:right"]');if(c)c.textContent=`${t.value.length}/200`}
  if(typeof handleInput==='function') handleInput(e);
});
document.addEventListener('keydown',e=>{

/* ============================================================
   FULL ACTION / INPUT / KEYDOWN HANDLERS
   ============================================================ */

function handleAction(act, t, e){
  // ===== creator app navigation =====
  if(act==='cr-nav'){STATE.creatorPanel=t.dataset.k;STATE.netCreatorView=null;STATE.openDmThread=null;render();return}

  // ===== brand & operator nav =====
  if(act==='brand-nav'){STATE.brandPanel=t.dataset.k;STATE.brandViewingCreator=null;render();return}
  if(act==='op-nav'){STATE.operatorPanel=t.dataset.k;STATE.opViewingCreator=null;STATE.viewingBrand=null;render();return}

  // ===== notifications =====
  if(act==='toggle-notif'){e.stopPropagation();STATE.notifOpen=!STATE.notifOpen;render();return}
  if(act==='mark-all-read'){STATE.notifications.forEach(n=>n.read=true);render();return}
  if(act==='notif-click'){const n=STATE.notifications.find(x=>x.id===t.dataset.id);if(n)n.read=true;STATE.notifOpen=false;render();return}

  // ===== feed =====
  if(act==='feed-toggle'){const id=t.dataset.id;STATE.expandedFeed[id]=!STATE.expandedFeed[id];STATE.expandedFeed[id+'_seen']=true;render();return}
  if(act==='feed-fb'){
    const id=t.dataset.id;const v=t.dataset.v;STATE.feedFb[id]=v;
    const p=STATE.intelPosts.find(x=>x.id===id);
    if(p){p.feedback=p.feedback||{};p.feedback.sofia=v;if(v==='useful')p.usefulCount++;else if(v==='acted_on')p.actedOnCount++}
    toast('Feedback recorded','Helps us tune your feed');render();return;
  }
  if(act==='add-to-cal'){
    const p=STATE.intelPosts.find(x=>x.id===t.dataset.id);
    if(!STATE.bookings.sofia)STATE.bookings.sofia=[];
    let dt=new Date(p.validUntil);dt.setHours(dt.getHours()-2);
    const tom=new Date();tom.setDate(tom.getDate()+1);tom.setHours(19,0,0,0);
    if(dt<tom) dt=tom;
    STATE.selCalYear=dt.getFullYear();STATE.selCalMonth=dt.getMonth();STATE.selCalDay=dt.getDate();
    STATE.bookings.sofia.push({id:'b'+Date.now(),venue:p.title.slice(0,40),type:p.category==='brand'?'brand':p.category==='collab'?'collab':'event',dateTime:dt.toISOString(),notes:p.body.slice(0,80),status:'pending',createdByBot:true});
    toast('Added to calendar',p.title.slice(0,50));render();return;
  }
  if(act==='ask-babyg'){
    const p=STATE.intelPosts.find(x=>x.id===t.dataset.id);
    STATE.creatorPanel='aria';
    setTimeout(()=>{const i=$('#chat-input');if(i){i.value=`What should I do about: ${p.title}?`;i.focus()}},80);
    render();return;
  }

  // ===== chat =====
  if(act==='chat-send'){sendChat();return}
  if(act==='quick-msg'){const i=$('#chat-input');if(i)i.value=t.dataset.v;sendChat();return}
  if(act==='draft-dm-open'){openSheet(renderDmDraftSheet());return}

  // ===== calendar =====
  if(act==='cal-prev'){STATE.selCalMonth--;if(STATE.selCalMonth<0){STATE.selCalMonth=11;STATE.selCalYear--}STATE.selCalDay=1;render();return}
  if(act==='cal-next'){STATE.selCalMonth++;if(STATE.selCalMonth>11){STATE.selCalMonth=0;STATE.selCalYear++}STATE.selCalDay=1;render();return}
  if(act==='cal-day'){STATE.selCalDay=parseInt(t.dataset.d);renderCalendarGrid();return}
  if(act==='open-event'){openSheet(renderEventSheet(t.dataset.id));return}
  if(act==='open-book-sheet'){openSheet(renderBookSheet());return}
  if(act==='ev-save'){
    const id=t.dataset.id;const b=(STATE.bookings.sofia||[]).find(x=>x.id===id);if(!b)return;
    b.venue=$('#ev-venue').value;b.dateTime=$('#ev-dt').value+':00';b.notes=$('#ev-notes').value;b.status=$('#ev-status').value;
    closeSheet();toast('Event updated','');render();return;
  }
  if(act==='ev-delete'){
    if(STATE._delArmed!==t.dataset.id){STATE._delArmed=t.dataset.id;openSheet(renderEventSheet(t.dataset.id,true));setTimeout(()=>{STATE._delArmed=null},3000);return}
    STATE._delArmed=null;
    STATE.bookings.sofia=(STATE.bookings.sofia||[]).filter(x=>x.id!==t.dataset.id);closeSheet();toast('Event deleted','');render();return;
  }
  if(act==='book-save'){
    const v=$('#book-venue').value.trim();if(!v){toast('Venue required','','error');return}
    const dt=$('#book-dt').value;if(!dt){toast('Date required','','error');return}
    if(!STATE.bookings.sofia)STATE.bookings.sofia=[];
    STATE.bookings.sofia.push({id:'b'+Date.now(),venue:v,type:$('#book-type').value,dateTime:dt+':00',notes:$('#book-notes').value||'No notes',status:'pending',createdByBot:true});
    const d=new Date(dt);STATE.selCalYear=d.getFullYear();STATE.selCalMonth=d.getMonth();STATE.selCalDay=d.getDate();
    closeSheet();toast(STATE.settings.botName+' is on it','Hold added · awaiting confirm');render();return;
  }

  // ===== network =====
  if(act==='net-sub'){STATE.netSub=t.dataset.v;STATE.netCreatorView=null;STATE.openDmThread=null;render();return}
  if(act==='net-search'){STATE.rosterFilter.search=t.value;debounce(render,'net-search');return}
  if(act==='net-niche'){STATE.rosterFilter.niche=t.dataset.v;render();return}
  if(act==='net-view'){STATE.netCreatorView=t.dataset.id;render();return}
  if(act==='net-back'){STATE.netCreatorView=null;render();return}
  if(act==='net-connect'){
    const c=STATE.creators.sofia;const id=t.dataset.id;const other=STATE.creators[id];
    c.connections=c.connections||[];other.connections=other.connections||[];
    const i=c.connections.indexOf(id);
    if(i>=0){c.connections.splice(i,1);const j=other.connections.indexOf(c.id);if(j>=0)other.connections.splice(j,1);toast('Disconnected','')}
    else{c.connections.push(id);other.connections.push(c.id);toast('Connected',`You can now message ${other.name.split(' ')[0]}`)}
    render();return;
  }
  if(act==='net-message'){const c=STATE.creators.sofia;const id=t.dataset.id;const k=threadKey(c.id,id);if(!STATE.dmThreads[k])STATE.dmThreads[k]={participants:[c.id,id],messages:[],unread:0};STATE.netCreatorView=null;STATE.netSub='messages';STATE.openDmThread=k;render();return}
  if(act==='suggest-collab'){toast('Collab suggested',`${STATE.settings.botName} will set it up`);return}
  if(act==='report-profile'){openOverlay(renderReportModal('profile',t.dataset.id));return}
  if(act==='report-listing'){openOverlay(renderReportModal('listing',t.dataset.id));return}
  if(act==='report-thread'){openOverlay(renderReportModal('thread',t.dataset.k));return}
  if(act==='report-submit'){
    const reason=$('#report-reason').value.trim();
    if(!reason){toast('Reason required','','error');return}
    STATE.abuseReports.push({id:'ar'+Date.now(),reporterId:'sofia',targetType:t.dataset.kind,targetId:t.dataset.id,reason,timestamp:'just now',status:'pending'});
    closeOverlay();toast('Report submitted','Operators will review within 24h');return;
  }

  // ===== jobs =====
  if(act==='job-filter'){STATE.jobFilter=t.dataset.v;render();return}
  if(act==='job-niche'){STATE.jobNiche=t.dataset.v;render();return}
  if(act==='job-interest'){const j=STATE.jobListings.find(x=>x.id===t.dataset.id);const i=j.interested.indexOf('sofia');if(i>=0)j.interested.splice(i,1);else{j.interested.push('sofia');toast('Interest sent',`${STATE.settings.botName} will set it up`)}render();return}
  if(act==='open-post-job'){openSheet(renderPostJobSheet());return}
  if(act==='post-job-save'){
    const title=$('#pj-title').value.trim();if(!title){toast('Title required','','error');return}
    STATE.jobListings.unshift({id:'j'+Date.now(),postedBy:'sofia',posterName:'Sofia L.',posterHandle:'@sofialux',title,description:$('#pj-desc').value||'(no description)',type:$('#pj-type').value,compensation:$('#pj-comp').value||'TBD',targetNiches:[STATE.creators.sofia.niche],deadline:$('#pj-deadline').value||null,isActive:true,interested:[],verified:false});
    closeSheet();toast('Listing posted','Visible to the network');render();return;
  }

  // ===== DMs =====
  if(act==='open-dm'){const t2=STATE.dmThreads[t.dataset.k];if(t2){t2.unread=0;t2.messages.forEach(m=>m.read=true)}STATE.openDmThread=t.dataset.k;render();return}
  if(act==='dm-back'){STATE.openDmThread=null;render();return}
  if(act==='dm-typing'){
    const slot=$('#dm-typing-slot');if(!slot)return;
    if(t.value.trim()){
      clearTimeout(window._dmTypeTimer);
      const other=STATE.creators[STATE.dmThreads[STATE.openDmThread].participants.find(x=>x!=='sofia')];
      slot.innerHTML=`<div class="msg bot" style="font-style:italic;opacity:.7">${esc(other.name.split(' ')[0])} is typing…</div>`;
      window._dmTypeTimer=setTimeout(()=>{slot.innerHTML=''},2000);
    }
    return;
  }
  if(act==='dm-send'){const k=t.dataset.k;const i=$('#dm-input');if(!i||!i.value.trim())return;const text=i.value.trim();const time=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});STATE.dmThreads[k].messages.push({from:'sofia',content:text,time,read:true});i.value='';render();return}
  if(act==='dm-draft'){openSheet(renderDmDraftSheet(t.dataset.k));return}
  if(act==='dm-draft-fill'){
    const k=t.dataset.k;const draft=t.dataset.d;
    closeSheet();
    if(k){STATE.openDmThread=k;render();setTimeout(()=>{const i=$('#dm-input');if(i){i.value=draft;i.focus()}},80)}
    else{const c=STATE.creators.sofia;if(!STATE.messages[c.id])STATE.messages[c.id]=[];STATE.messages[c.id].push({id:'m'+Date.now(),role:'bot',content:`Draft ready:\n\n"${draft}"\n\nSend it manually whenever you're ready.`,time:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})});STATE.creatorPanel='aria';render()}
    toast('Draft ready','Edit before sending');return;
  }

  // ===== creator profile edits =====
  if(act==='cr-edit-field'){
    const k=t.dataset.k;const c=STATE.creators.sofia;const cur=c[k]||'';
    const nv=prompt(`Edit ${k}`,cur);if(nv===null)return;c[k]=nv;render();toast('Updated','Saved everywhere');return;
  }
  if(act==='cr-toggle-conn'){STATE._crConn=STATE._crConn||{};STATE._crConn[t.dataset.k]=!STATE._crConn[t.dataset.k];render();return}
  if(act==='cr-toggle-notif'){STATE.creators.sofia.notificationSettings[t.dataset.k]=t.checked||t.querySelector('input')?.checked;return}
  if(act==='cr-save-bio'){const v=$('#cr-bio').value;STATE.creators.sofia.bio=v;toast('Bio saved','Updated everywhere');render();return}
  if(act==='cr-save-bot-name'){const v=$('#cr-bot-name').value.trim();if(v){STATE.settings.botName=v;toast('Updated everywhere',`Now "${v}"`);render()}return}
  if(act==='confirm-disconnect'){openOverlay(renderConfirmDialog('Disconnect all platforms?','This logs babyg out of Instagram, Gmail, and any restaurant integrations.','disconnect-confirm'));return}
  if(act==='disconnect-confirm'){STATE._crConn={instagram:false,gmail:false,resy:false,opentable:false};closeOverlay();toast('All disconnected','Reconnect anytime in Profile');render();return}
  if(act==='export-data'){toast('Preparing your data export','You\'ll receive an email shortly','info');return}
  if(act==='open-log-post'){openSheet(renderLogPostSheet());return}
  if(act==='log-post-save'){
    const url=$('#lp-url').value.trim();if(!url){toast('URL required','','error');return}
    const c=STATE.creators.sofia;
    c.receipts=c.receipts||[];
    c.receipts.unshift({id:'r'+Date.now(),type:$('#lp-type').value,date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}),caption:$('#lp-cap').value||'(no caption)',likes:parseInt($('#lp-likes').value)||0,comments:parseInt($('#lp-comments').value)||0,intelId:$('#lp-intel').value||null});
    closeSheet();toast('Post logged','');render();return;
  }

  // ===== brand handlers =====
  if(act==='brand-search'){STATE.rosterFilter.search=t.value;debounce(render,'brand-search');return}
  if(act==='brand-tier'){STATE.rosterFilter.tier=t.value;render();return}
  if(act==='brand-niche'){STATE.rosterFilter.niche=t.value;render();return}
  if(act==='brand-view-creator'){STATE.brandViewingCreator=t.dataset.id;render();return}
  if(act==='brand-back-creator'){STATE.brandViewingCreator=null;render();return}
  if(act==='brand-open-thread'){toast('Thread opened','Aesop ↔ Sofia','info');return}
  if(act==='brand-msg-send'){const k=t.dataset.k;const i=$('#brand-msg-input');if(!i||!i.value.trim())return;STATE.brandMessages[k]=STATE.brandMessages[k]||[];STATE.brandMessages[k].push({from:'brand',content:i.value.trim(),time:'just now',read:false});i.value='';render();return}
  if(act==='brand-dlv'){STATE._brandDlv=STATE._brandDlv||{};STATE._brandDlv[t.dataset.k]=t.checked||t.querySelector('input')?.checked;return}
  if(act==='open-post-opp'){openOverlay(renderPostOppModal());return}
  if(act==='post-opp-save'){
    const title=$('#po-title').value.trim();if(!title){toast('Title required','','error');return}
    STATE.jobListings.unshift({id:'j'+Date.now(),postedBy:'operator',posterName:'Aesop Miami',title,description:$('#po-desc').value,type:'brand_deal',compensation:$('#po-comp').value,targetNiches:[$('#po-niche').value],deadline:$('#po-dl').value||null,isActive:true,interested:[],verified:true});
    closeOverlay();toast('Opportunity posted','Live to verified creators');render();return;
  }

  // ===== operator handlers =====
  if(act==='op-roster-search'){STATE.rosterFilter.search=t.value;debounce(render,'op-roster-search');return}
  if(act==='op-roster-tier'){STATE.rosterFilter.tier=t.value;render();return}
  if(act==='op-roster-niche'){STATE.rosterFilter.niche=t.value;render();return}
  if(act==='op-roster-active'){STATE.rosterFilter.activeOnly=t.checked||t.querySelector('input')?.checked;render();return}
  if(act==='op-toggle-active'){const c=STATE.creators[t.dataset.id];c.active=!c.active;toast('Status updated',c.name+' is now '+(c.active?'active':'inactive'));render();return}
  if(act==='op-view-creator'){STATE.opViewingCreator=t.dataset.id;STATE.opProfileTab='overview';render();return}
  if(act==='op-back-roster'){STATE.opViewingCreator=null;STATE.operatorPanel='roster';render();return}
  if(act==='op-prof-tab'){STATE.opProfileTab=t.dataset.v;render();return}
  if(act==='op-edit-creator'){openOverlay(renderEditCreatorModal(t.dataset.id));return}
  if(act==='op-edit-creator-save'){
    const id=t.dataset.id;const c=STATE.creators[id];
    c.name=$('#ec-name').value;c.handle=$('#ec-handle').value;c.niche=$('#ec-niche').value;
    c.tier=$('#ec-tier').value;c.city=$('#ec-city').value;c.neighborhood=$('#ec-hood').value;
    c.bio=$('#ec-bio').value;c.active=$('#ec-active').checked;
    closeOverlay();toast('Profile saved','Updated everywhere');render();return;
  }
  if(act==='op-add-creator'){openOverlay(renderAddCreatorModal());return}
  if(act==='op-add-creator-save'){
    const n=$('#ac-name').value.trim();if(!n){toast('Name required','','error');return}
    const id='c'+Date.now();
    const initials=n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
    const followers=parseInt($('#ac-followers').value)||25000;
    const er=parseFloat($('#ac-er').value)||3.0;
    STATE.creators[id]={id,name:n,handle:$('#ac-handle').value||'@'+n.toLowerCase().split(' ')[0],niche:$('#ac-niche').value,city:'Miami',neighborhood:'Brickell',followers,engagementRate:er,tier:$('#ac-tier').value,postsPerWeek:3,active:true,bio:'New to the roster.',avatarGradient:'linear-gradient(135deg,#FFB84E,#4EFFE0)',avatarInitials:initials,baselineFollowers:followers,baselineEngagement:er,baselinePostsPerWeek:2,brandDealsActive:0,brandDealValue:0,writingSamples:[],hardLimits:[],connections:[],notificationSettings:{dailyIntel:true,postingReminders:true,bookingReminders:true,smsAlerts:false,collabMatches:true,weeklyDigest:true},performance:[]};
    closeOverlay();toast('Creator added',n+' added to roster');render();return;
  }
  if(act==='op-add-booking'){openSheet(renderBookSheet(t.dataset.id));return}
  if(act==='op-log-perf'){openSheet(renderLogPerfSheet(t.dataset.id||STATE.opViewingCreator||'sofia'));return}
  if(act==='op-log-perf-save'){

function debounce(fn,key,ms=180){clearTimeout(_searchTimer[key]);_searchTimer[key]=setTimeout(fn,ms)}

function commitComposer(){
  const c=STATE.composer;
  const t=$('#cmp-title');if(t)c.title=t.value;
