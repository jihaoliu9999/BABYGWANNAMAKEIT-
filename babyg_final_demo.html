<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>BabyG — the missing system between your lifestyle and your results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,500;1,600;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080B;--s1:#0C1018;--s2:#121820;--s3:#1A2230;
  --lime:#B8FF4E;--cyan:#4EFFE0;--pink:#FF4EB8;--amber:#FFB84E;--blue:#4E9FFF;--red:#FF5C5C;
  --txt:#ECF0F5;--txt2:#8899AA;--txt3:#4A5568;
  --line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.10);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:'Outfit',system-ui,sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea,select{font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}
::selection{background:var(--lime);color:#000}
.mono{font-family:'JetBrains Mono',monospace}
.italic{font-family:'Playfair Display',serif;font-style:italic;font-weight:500;letter-spacing:-.01em}
:focus-visible{outline:2px solid var(--lime);outline-offset:2px;border-radius:4px}

/* shell */
.app-shell{display:grid;grid-template-columns:200px 1fr;min-height:100vh}
.sidebar{background:var(--s1);border-right:1px solid var(--line);padding:18px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px;z-index:50}
.logo{font-family:'Playfair Display',serif;font-style:italic;font-weight:600;font-size:28px;color:var(--lime);padding:0 8px 16px;letter-spacing:-.02em;line-height:1}
.logo small{display:block;font-family:'Outfit',sans-serif;font-style:normal;font-weight:500;font-size:9px;color:var(--txt3);letter-spacing:.22em;text-transform:uppercase;margin-top:6px}
.nav-section{margin-top:6px;font-size:9px;color:var(--txt3);letter-spacing:.22em;text-transform:uppercase;padding:12px 8px 4px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;color:var(--txt2);font-size:13px;font-weight:500;cursor:pointer;transition:.15s}
.nav-item:hover{background:var(--s2);color:var(--txt)}
.nav-item.active{background:rgba(184,255,78,.08);color:var(--lime)}
.nav-item .ico{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-item .badge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--pink);color:#000;padding:1px 6px;border-radius:8px;font-weight:600}
.view-switch{margin-top:auto;background:var(--s2);border:1px solid var(--line);border-radius:12px;padding:4px;display:flex;gap:3px}
.view-btn{flex:1;padding:9px 6px;border-radius:9px;font-size:11px;font-weight:600;color:var(--txt2);text-align:center;letter-spacing:.06em}
.view-btn.active.op{background:var(--blue);color:#000}
.view-btn.active.cr{background:var(--lime);color:#000}
.user-chip{margin-top:8px;display:flex;align-items:center;gap:9px;padding:9px;background:var(--s2);border-radius:10px;border:1px solid var(--line)}
.user-chip-meta{display:flex;flex-direction:column;min-width:0}
.user-chip-meta .n{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-chip-meta .r{font-size:9px;color:var(--txt3);letter-spacing:.12em;text-transform:uppercase}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:12px 22px;border-bottom:1px solid var(--line);background:rgba(6,8,11,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:40;height:62px}
.title{font-size:19px;font-weight:700;letter-spacing:-.02em}
.subtitle{font-size:11px;color:var(--txt2);margin-top:1px}
.title-wrap{display:flex;flex-direction:column;min-width:0}
.spacer{flex:1}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:.04em}
.chip.live{background:rgba(78,255,224,.1);color:var(--cyan);border:1px solid rgba(78,255,224,.25)}
.chip.live .dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:pulse 1.4s infinite}
.chip.view-chip{background:var(--s2);color:var(--txt2);border:1px solid var(--line)}
.chip.view-chip.op{color:var(--blue);border-color:rgba(78,159,255,.3);background:rgba(78,159,255,.08)}
.chip.view-chip.cr{color:var(--lime);border-color:rgba(184,255,78,.3);background:rgba(184,255,78,.08)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.9)}}
.bell{position:relative;width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--txt2)}
.bell:hover{color:var(--txt);background:var(--s3)}
.bell .badge-c{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:99px;background:var(--pink);color:#000;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace}

.content-area{padding:22px;max-width:1280px;margin:0 auto;width:100%;flex:1;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* common */
.insight{background:linear-gradient(135deg,rgba(78,159,255,.08),rgba(184,255,78,.04));border:1px solid var(--line2);border-left:3px solid var(--blue);padding:14px 16px;border-radius:12px;margin-bottom:20px;display:flex;gap:13px}
.insight.lime{border-left-color:var(--lime);background:linear-gradient(135deg,rgba(184,255,78,.08),rgba(78,255,224,.04))}
.insight.amber{border-left-color:var(--amber);background:linear-gradient(135deg,rgba(255,184,78,.08),rgba(255,78,184,.03))}
.insight .ico{flex-shrink:0;width:26px;height:26px;border-radius:7px;background:var(--s3);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:13px;font-weight:600}
.insight.lime .ico{color:var(--lime)}
.insight.amber .ico{color:var(--amber)}
.insight .body{font-size:12.5px;line-height:1.55;color:var(--txt2)}
.insight .body strong{color:var(--txt);font-weight:600}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat-card{background:var(--s1);border:1px solid var(--line);border-radius:13px;padding:16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--lime)}
.stat-card.cyan::before{background:var(--cyan)}.stat-card.pink::before{background:var(--pink)}.stat-card.amber::before{background:var(--amber)}
.stat-label{font-size:10px;color:var(--txt3);letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-bottom:8px}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1}
.stat-value .u{font-size:14px;color:var(--txt2);margin-left:2px}
.stat-delta{font-size:11px;color:var(--lime);margin-top:6px;font-weight:500}
.stat-delta.flat{color:var(--txt3)}

.card{background:var(--s1);border:1px solid var(--line);border-radius:13px;padding:18px;margin-bottom:14px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:10px}
.card-title{font-size:13px;font-weight:600;letter-spacing:-.01em}
.card-sub{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.16em;font-weight:600;margin-top:3px}
.link{color:var(--blue);font-size:11px;font-weight:600;cursor:pointer}
.link:hover{text-decoration:underline}

.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{font-size:10px;color:var(--txt3);letter-spacing:.16em;text-transform:uppercase;text-align:left;padding:9px 10px;font-weight:600;border-bottom:1px solid var(--line)}
.table td{padding:12px 10px;border-bottom:1px solid var(--line)}
.table tr:last-child td{border-bottom:0}
.table tbody tr{cursor:pointer;transition:.12s}
.table tbody tr:hover td{background:var(--s2)}
.creator-cell{display:flex;align-items:center;gap:11px}
.cr-name{font-size:13px;font-weight:600;line-height:1.2}
.cr-meta{font-size:10px;color:var(--txt3);margin-top:2px;letter-spacing:.02em}
.bar-cell{display:flex;align-items:center;gap:9px}
.bar{width:64px;height:4px;background:var(--s3);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;background:var(--lime);border-radius:99px;transition:width .6s ease}
.tier{display:inline-block;font-size:9px;font-weight:700;padding:3px 7px;border-radius:999px;letter-spacing:.1em;text-transform:uppercase}
.tier.vip{background:rgba(255,184,78,.12);color:var(--amber);border:1px solid rgba(255,184,78,.25)}
.tier.pro{background:rgba(184,255,78,.12);color:var(--lime);border:1px solid rgba(184,255,78,.25)}
.tier.basic{background:rgba(136,153,170,.12);color:var(--txt2);border:1px solid rgba(136,153,170,.2)}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 3px rgba(78,255,224,.15)}
.status-dot.idle{background:var(--txt3);box-shadow:0 0 0 3px rgba(74,85,104,.15)}

.av{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#000;font-weight:700;flex-shrink:0;font-family:'Outfit',sans-serif}

/* forms */
.form-row{margin-bottom:13px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.label{display:block;font-size:10px;color:var(--txt2);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.input,.textarea,.select{width:100%;background:var(--s2);border:1px solid var(--line);border-radius:10px;padding:10px 13px;color:var(--txt);font-size:13px;font-family:inherit;transition:.15s}
.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--lime);background:var(--s3)}
.textarea{resize:vertical;min-height:84px;line-height:1.5}
.pill-row{display:flex;flex-wrap:wrap;gap:7px}
.pill{padding:6px 12px;background:var(--s2);border:1px solid var(--line);border-radius:999px;font-size:11px;font-weight:500;color:var(--txt2);cursor:pointer;transition:.15s;user-select:none}
.pill:hover{border-color:var(--line2);color:var(--txt)}
.pill.on{background:var(--lime);color:#000;border-color:var(--lime);font-weight:600}
.pill.on.cyan{background:var(--cyan);border-color:var(--cyan)}
.pill.on.pink{background:var(--pink);border-color:var(--pink)}
.pill.on.amber{background:var(--amber);border-color:var(--amber)}
.pill.on.blue{background:var(--blue);border-color:var(--blue)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 16px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s;border:1px solid transparent;white-space:nowrap}
.btn.primary{background:var(--lime);color:#000}
.btn.primary:hover{background:#cdff7a;transform:translateY(-1px)}
.btn.ghost{background:var(--s2);color:var(--txt);border-color:var(--line2)}
.btn.ghost:hover{background:var(--s3)}
.btn.cyan{background:var(--cyan);color:#000}
.btn.pink{background:var(--pink);color:#000}
.btn.danger{background:rgba(255,92,92,.12);color:var(--red);border-color:rgba(255,92,92,.3)}
.btn.danger:hover{background:rgba(255,92,92,.2)}
.btn.sm{padding:7px 11px;font-size:11px}
.btn.full{width:100%}
.btn-row{display:flex;gap:9px;align-items:center;margin-top:8px;flex-wrap:wrap}
.btn-row .reach{margin-left:auto;font-size:11.5px;color:var(--txt2)}
.btn-row .reach b{color:var(--lime);font-family:'JetBrains Mono',monospace}

/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--s2);padding:4px;border-radius:10px;width:fit-content;border:1px solid var(--line);flex-wrap:wrap}
.tab{padding:7px 14px;font-size:11.5px;font-weight:600;color:var(--txt2);border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:6px}
.tab.active{background:var(--s3);color:var(--txt)}
.tab .count{font-family:'JetBrains Mono',monospace;font-size:9px;background:var(--s3);padding:1px 6px;border-radius:99px;color:var(--txt2)}
.tab.active .count{background:var(--pink);color:#000}

/* hot drop library row */
.intel-row{display:flex;align-items:center;gap:12px;padding:13px;border-radius:11px;background:var(--s2);margin-bottom:7px;border:1px solid transparent}
.intel-row:hover{border-color:var(--line2)}
.intel-cat{flex-shrink:0;font-size:9px;font-weight:700;padding:3px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.1em}
.cat-venue{background:rgba(78,255,224,.12);color:var(--cyan)}
.cat-trend{background:rgba(255,184,78,.12);color:var(--amber)}
.cat-brand{background:rgba(255,78,184,.12);color:var(--pink)}
.cat-collab{background:rgba(78,255,224,.12);color:var(--cyan)}
.cat-alert{background:rgba(255,92,92,.12);color:var(--red)}
.intel-body{flex:1;min-width:0}
.intel-title{font-size:12.5px;font-weight:600;margin-bottom:2px}
.intel-meta{font-size:10px;color:var(--txt3)}
.intel-stat{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt2);text-align:right;white-space:nowrap}
.intel-stat b{color:var(--txt);font-weight:600}
.decay{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border-radius:5px;white-space:nowrap}
.decay.active{background:rgba(184,255,78,.12);color:var(--lime)}
.decay.exp{background:rgba(255,184,78,.12);color:var(--amber)}
.decay.arch{background:rgba(136,153,170,.1);color:var(--txt3)}
.intel-actions{display:flex;gap:5px}
.intel-actions .btn{padding:5px 9px;font-size:10px}

/* activity */
.activity-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer}
.activity-item:hover{padding-left:4px;transition:padding .15s}
.activity-item:last-child{border-bottom:0}
.activity-icon{width:30px;height:30px;border-radius:8px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.activity-text{flex:1;font-size:12.5px;min-width:0}
.activity-text small{display:block;color:var(--txt3);font-size:10.5px;margin-top:2px}
.activity-time{font-size:10.5px;color:var(--txt3);font-family:'JetBrains Mono',monospace;white-space:nowrap}

/* filters */
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.toggle{position:relative;display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:11.5px;color:var(--txt2)}
.toggle input{display:none}
.switch{width:30px;height:17px;background:var(--s3);border-radius:99px;position:relative;transition:.2s;border:1px solid var(--line)}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;background:var(--txt2);border-radius:50%;transition:.2s}
.toggle input:checked + .switch{background:var(--lime);border-color:var(--lime)}
.toggle input:checked + .switch::after{background:#000;left:15px}
.search{flex:1;min-width:180px;background:var(--s2);border:1px solid var(--line);border-radius:10px;padding:8px 13px;color:var(--txt);font-size:12.5px}
.search:focus{outline:none;border-color:var(--lime)}

/* notifications */
.notif-panel{position:absolute;top:calc(100% + 8px);right:22px;width:340px;background:var(--s1);border:1px solid var(--line2);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.6);z-index:60;display:none;overflow:hidden}
.notif-panel.open{display:block}
.notif-head{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line)}
.notif-head .t{font-size:12.5px;font-weight:600}
.notif-head .a{font-size:11px;color:var(--blue);cursor:pointer}
.notif-item{display:flex;gap:11px;padding:13px 16px;border-bottom:1px solid var(--line);transition:.15s;cursor:pointer}
.notif-item:last-child{border-bottom:0}
.notif-item.unread{background:rgba(184,255,78,.04)}
.notif-item:hover{background:var(--s2)}
.notif-ico{width:28px;height:28px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.notif-body{flex:1;font-size:12.5px;line-height:1.4}
.notif-body small{display:block;color:var(--txt3);font-size:10.5px;margin-top:3px}

/* overlay/modal/sheet */
.overlay{position:fixed;inset:0;background:rgba(6,8,11,.85);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
.modal{background:var(--s1);border:1px solid var(--line2);border-radius:14px;padding:22px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;animation:modalIn .2s}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:600;letter-spacing:-.01em}
.modal-close{width:30px;height:30px;border-radius:8px;background:var(--s2);color:var(--txt);display:flex;align-items:center;justify-content:center;font-size:18px}

.phone-frame{width:300px;background:#000;border-radius:36px;padding:14px;border:6px solid #1a1a1a;box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 2px rgba(255,255,255,.04);position:relative}
.phone-screen{background:var(--bg);border-radius:24px;overflow:hidden;min-height:520px}
.phone-status{display:flex;justify-content:space-between;align-items:center;padding:12px 18px 8px;font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--txt2)}
.overlay-close{position:absolute;top:-44px;right:0;width:36px;height:36px;border-radius:50%;background:var(--s2);border:1px solid var(--line2);color:var(--txt);display:flex;align-items:center;justify-content:center;font-size:18px}

.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:90;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s}
.sheet{background:var(--s1);border:1px solid var(--line);border-bottom:0;border-radius:22px 22px 0 0;padding:20px;width:100%;max-width:430px;animation:sheetIn .25s ease;max-height:80vh;overflow-y:auto}
@keyframes sheetIn{from{transform:translateY(100%)}to{transform:none}}
.sheet h3{margin:0 0 14px;font-family:'Playfair Display',serif;font-style:italic;font-size:22px;font-weight:500}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--s3);margin:0 auto 12px}

/* toast */
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:9px;pointer-events:none}
.toast{background:var(--s1);border:1px solid var(--line2);border-left:3px solid var(--lime);padding:13px 16px;border-radius:10px;min-width:260px;max-width:340px;box-shadow:0 10px 40px rgba(0,0,0,.5);animation:toastIn .25s ease;pointer-events:auto}
.toast.error{border-left-color:var(--red)}
.toast.info{border-left-color:var(--blue)}
.toast .t{font-size:12.5px;font-weight:600;color:var(--lime);margin-bottom:2px}
.toast.error .t{color:var(--red)}
.toast.info .t{color:var(--blue)}
.toast .b{font-size:11.5px;color:var(--txt2);line-height:1.4}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* charts */
.chart{display:flex;align-items:flex-end;gap:12px;height:180px;position:relative;padding-bottom:30px;border-bottom:1px dashed var(--line);margin-top:10px}
.chart-launch{position:absolute;top:0;bottom:30px;border-left:1px dashed rgba(184,255,78,.4);font-size:9px;color:var(--lime);font-weight:600;padding-left:6px;letter-spacing:.1em;text-transform:uppercase}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;position:relative;cursor:pointer}
.bar-bar{width:100%;max-width:36px;background:rgba(184,255,78,.3);border-radius:5px 5px 0 0;height:0;transition:height .9s cubic-bezier(.2,.8,.2,1);position:relative}
.bar-bar.cyan{background:rgba(78,255,224,.3)}
.bar-bar.cur{background:var(--lime)}
.bar-bar.cur.cyan{background:var(--cyan)}
.bar-col:hover .bar-bar{filter:brightness(1.2)}
.bar-tip{position:absolute;top:-32px;left:50%;transform:translateX(-50%);background:#000;border:1px solid var(--line2);padding:4px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--lime);font-weight:600;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s}
.bar-col:hover .bar-tip{opacity:1}
.bar-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt3);position:absolute;bottom:-22px;letter-spacing:.04em}

.ring{width:120px;height:120px;position:relative;margin:0 auto}
.ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring circle{fill:none;stroke-width:8}
.ring .bg{stroke:var(--s3)}
.ring .fg{stroke:var(--lime);stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.ring .v{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .v .n{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600}
.ring .v .l{font-size:9px;color:var(--txt3);letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-top:2px}

/* ===== CREATOR (phone) ===== */
.creator-shell{max-width:390px;margin:0 auto;background:var(--bg);min-height:calc(100vh - 110px);position:relative;border-radius:28px;border:1px solid var(--line);overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5);display:flex;flex-direction:column}
.cr-loginbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--line);background:var(--s1);font-size:10.5px;color:var(--txt3)}
.cr-loginbar select{background:var(--s2);border:1px solid var(--line);border-radius:8px;padding:5px 8px;color:var(--lime);font-size:11px;font-weight:600}
.cr-status{display:flex;justify-content:space-between;align-items:center;padding:12px 22px 6px;font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--txt2)}
.cr-content{padding:0 16px 80px;min-height:520px;flex:1;overflow-y:auto}
.cr-tabbar{position:sticky;bottom:0;background:rgba(12,16,24,.95);backdrop-filter:blur(20px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(6,1fr);padding:7px 4px 11px}
.cr-tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 3px;color:var(--txt3);font-size:9px;letter-spacing:.04em;border-radius:8px;cursor:pointer;position:relative}
.cr-tab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.cr-tab.active{color:var(--lime)}
.cr-tab .live{position:absolute;top:5px;right:18px;width:5px;height:5px;background:var(--cyan);border-radius:50%}

.cr-header{padding:18px 4px 14px}
.cr-greet{font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:var(--txt3);font-weight:600}
.cr-name-big{font-family:'Playfair Display',serif;font-style:italic;font-size:32px;font-weight:500;margin-top:4px;letter-spacing:-.02em}
.cr-sub{font-size:12.5px;color:var(--txt2);margin-top:6px}
.cr-sub b{color:var(--lime);font-weight:600}

/* feed */
.feed-card{background:var(--s1);border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:11px;border-left:3px solid var(--cyan);cursor:pointer;transition:.2s;position:relative}
.feed-card.unread::before{content:'';position:absolute;top:13px;right:13px;width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 3px rgba(184,255,78,.2)}
.feed-card.trend{border-left-color:var(--amber)}
.feed-card.brand{border-left-color:var(--pink)}
.feed-card.collab{border-left-color:var(--cyan)}
.feed-card.alert{border-left-color:var(--red)}
.feed-cat{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin-bottom:5px}
.feed-card.trend .feed-cat{color:var(--amber)}
.feed-card.brand .feed-cat{color:var(--pink)}
.feed-card.collab .feed-cat{color:var(--cyan)}
.feed-card.alert .feed-cat{color:var(--red)}
.feed-title{font-size:13.5px;font-weight:600;line-height:1.35;padding-right:18px}
.feed-time{font-size:10.5px;color:var(--txt3);margin-top:5px;font-family:'JetBrains Mono',monospace}
.feed-expand{display:none;margin-top:13px;padding-top:13px;border-top:1px solid var(--line);font-size:12.5px;line-height:1.6;color:var(--txt2)}
.feed-card.open .feed-expand{display:block}
.feed-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:11px 0;background:var(--s2);padding:11px;border-radius:9px}
.feed-meta-grid .k{font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.feed-meta-grid .v{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--txt);font-weight:600;margin-top:2px}
.feed-fb{display:flex;gap:5px;margin-top:11px}
.fb-btn{flex:1;padding:7px;background:var(--s2);border:1px solid var(--line);border-radius:7px;font-size:10.5px;font-weight:600;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.fb-btn:hover{color:var(--txt);border-color:var(--line2)}
.fb-btn.on{background:var(--lime);color:#000;border-color:var(--lime)}
.fb-btn.on.bad{background:var(--red);color:#fff;border-color:var(--red)}
.fb-btn.on.act{background:var(--cyan);color:#000;border-color:var(--cyan)}

/* aria chat */
.chat-head{display:flex;align-items:center;gap:11px;padding:14px 4px 16px;border-bottom:1px solid var(--line);margin-bottom:13px}
.chat-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--lime),var(--cyan));display:flex;align-items:center;justify-content:center;color:#000;font-size:19px;font-weight:700;position:relative;flex-shrink:0}
.chat-avatar::after{content:'';position:absolute;bottom:0;right:0;width:11px;height:11px;border-radius:50%;background:var(--cyan);border:2px solid var(--bg)}
.chat-meta .n{font-family:'Playfair Display',serif;font-style:italic;font-size:19px;font-weight:500}
.chat-meta .s{font-size:10.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.chat-status{font-size:10.5px;color:var(--cyan);margin-top:3px;display:flex;align-items:center;gap:5px}
.chat-status .d{width:5px;height:5px;background:var(--cyan);border-radius:50%}
.chat-msgs{max-height:420px;overflow-y:auto;padding:4px;display:flex;flex-direction:column;gap:11px}
.chat-msgs::-webkit-scrollbar{width:0}
.msg{max-width:80%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.5;white-space:pre-wrap}
.msg.bot{background:var(--s2);color:var(--txt);border-top-left-radius:4px;align-self:flex-start}
.msg.user{background:var(--lime);color:#000;border-top-right-radius:4px;align-self:flex-end;font-weight:500}
.msg-time{font-size:9.5px;color:var(--txt3);margin-top:3px;font-family:'JetBrains Mono',monospace;align-self:inherit;padding:0 6px}
.typing{display:flex;gap:4px;padding:13px;background:var(--s2);border-radius:14px;border-top-left-radius:4px;align-self:flex-start;width:fit-content}
.typing span{width:6px;height:6px;background:var(--txt3);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.chat-input-wrap{display:flex;gap:7px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.chat-input{flex:1;background:var(--s2);border:1px solid var(--line);border-radius:14px;padding:10px 13px;color:var(--txt);font-size:13px}
.chat-input:focus{outline:none;border-color:var(--lime)}
.chat-send{width:40px;height:40px;border-radius:13px;background:var(--lime);color:#000;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0}
.chat-quick{display:flex;gap:6px;padding:0 4px 12px;flex-wrap:wrap}
.chat-quick .pill{font-size:10.5px;padding:5px 10px}

/* calendar */
.cal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 4px 16px}
.cal-month{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;font-weight:500}
.cal-nav{display:flex;gap:5px}
.cal-arrow{width:30px;height:30px;border-radius:8px;background:var(--s2);border:1px solid var(--line);color:var(--txt);display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-dh{font-size:9.5px;font-weight:700;color:var(--txt3);text-align:center;letter-spacing:.1em;padding:5px 0}
.cal-day{aspect-ratio:1;background:var(--s2);border:1px solid var(--line);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--txt2);position:relative;transition:.15s}
.cal-day:hover{background:var(--s3);color:var(--txt)}
.cal-day.empty{visibility:hidden}
.cal-day.today{border-color:var(--lime);color:var(--lime);background:rgba(184,255,78,.06)}
.cal-day.sel{background:var(--lime);color:#000;border-color:var(--lime);font-weight:700}
.cal-dots{display:flex;gap:2px;margin-top:auto;padding-bottom:2px}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan)}
.cal-dot.pink{background:var(--pink)}
.cal-dot.amber{background:var(--amber)}
.cal-dot.lime{background:var(--lime)}
.agenda-head{font-size:11.5px;text-transform:uppercase;letter-spacing:.16em;color:var(--txt3);font-weight:600;margin-bottom:11px}
.agenda-item{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer}
.agenda-item:last-child{border-bottom:0}
.agenda-item:hover{padding-left:4px;transition:padding .15s}
.agenda-item.cancelled .agenda-title{text-decoration:line-through;color:var(--txt3)}
.agenda-time{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--txt2);width:60px;flex-shrink:0;padding-top:2px}
.agenda-bar{width:3px;border-radius:2px;background:var(--cyan);flex-shrink:0}
.agenda-bar.pink{background:var(--pink)}
.agenda-bar.amber{background:var(--amber)}
.agenda-bar.lime{background:var(--lime)}
.agenda-body{flex:1;min-width:0}
.agenda-title{font-size:12.5px;font-weight:600}
.agenda-sub{font-size:10.5px;color:var(--txt3);margin-top:2px}
.agenda-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:5px;margin-top:5px}
.agenda-tag.cyan{background:rgba(78,255,224,.1);color:var(--cyan)}
.agenda-tag.pink{background:rgba(255,78,184,.1);color:var(--pink)}
.agenda-tag.amber{background:rgba(255,184,78,.1);color:var(--amber)}
.agenda-tag.lime{background:rgba(184,255,78,.1);color:var(--lime)}
.book-btn{margin-top:16px;width:100%;padding:13px;background:var(--s2);border:1px dashed var(--line2);border-radius:13px;color:var(--lime);font-size:12.5px;font-weight:600;cursor:pointer}
.book-btn:hover{background:var(--s3)}

/* network */
.net-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--s2);padding:3px;border-radius:9px;border:1px solid var(--line);overflow-x:auto}
.net-tab{padding:7px 11px;font-size:10.5px;font-weight:600;color:var(--txt2);border-radius:6px;cursor:pointer;white-space:nowrap}
.net-tab.active{background:var(--s3);color:var(--txt)}
.net-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.net-card{background:var(--s1);border:1px solid var(--line);border-radius:13px;padding:13px;text-align:center;cursor:pointer;transition:.15s}
.net-card:hover{border-color:var(--line2)}
.net-name{font-size:13px;font-weight:600;margin-top:9px}
.net-handle{font-size:10.5px;color:var(--txt3);margin-top:1px;font-family:'JetBrains Mono',monospace}
.net-stats{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--txt2);margin-top:7px;display:flex;justify-content:center;gap:7px}
.net-stats b{color:var(--lime)}
.net-niche{font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;margin-top:3px;font-weight:600}
.net-overlap{font-size:10px;color:var(--cyan);margin-top:5px;font-weight:600}
.net-actions{display:flex;gap:5px;margin-top:9px}
.net-actions .btn{flex:1;padding:6px;font-size:10px}
.net-connect.connected{background:rgba(184,255,78,.1);color:var(--lime);border-color:rgba(184,255,78,.3)}

.collab-card{background:var(--s1);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:9px}
.collab-head{display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:7px}
.collab-by{display:flex;align-items:center;gap:7px;font-size:10.5px;color:var(--txt3);margin-bottom:7px}
.collab-by .badge-op{background:rgba(78,159,255,.12);color:var(--blue);padding:2px 7px;border-radius:99px;font-weight:600;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase}
.collab-title{font-size:13px;font-weight:600;flex:1}
.collab-rate{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--lime);font-weight:600;white-space:nowrap}
.collab-sub{font-size:11px;color:var(--txt3);margin-bottom:9px;line-height:1.5}
.collab-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.collab-tag{background:var(--s3);color:var(--txt2);font-size:9.5px;padding:2px 7px;border-radius:99px;font-weight:500}
.collab-meta{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;color:var(--txt3);margin-bottom:9px}
.collab-btn{width:100%;padding:8px;background:var(--s2);border:1px solid var(--line2);border-radius:8px;font-size:10.5px;font-weight:600;color:var(--txt);cursor:pointer}
.collab-btn.on,.collab-btn.handled{background:rgba(184,255,78,.1);color:var(--lime);border-color:rgba(184,255,78,.3)}

.dm-thread{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.dm-thread:hover{padding-left:8px;transition:padding .15s}
.dm-thread-body{flex:1;min-width:0}
.dm-thread-name{font-size:13px;font-weight:600}
.dm-thread-msg{font-size:11.5px;color:var(--txt3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm-thread-meta{text-align:right;flex-shrink:0}
.dm-thread-time{font-size:10px;color:var(--txt3);font-family:'JetBrains Mono',monospace}
.dm-thread-badge{margin-top:4px;display:inline-block;background:var(--lime);color:#000;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:99px;font-family:'JetBrains Mono',monospace}

/* creator stats */
.cr-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.cr-stat{background:var(--s1);border:1px solid var(--line);border-radius:13px;padding:14px;border-top:2px solid var(--lime)}
.cr-stat.cyan{border-top-color:var(--cyan)}
.cr-stat.pink{border-top-color:var(--pink)}
.cr-stat.amber{border-top-color:var(--amber)}
.cr-stat .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--txt3);font-weight:600;margin-bottom:7px}
.cr-stat .v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;letter-spacing:-.02em}
.cr-stat .v .u{font-size:13px;color:var(--txt2)}
.cr-stat .d{font-size:10.5px;color:var(--lime);margin-top:5px;font-weight:500}

/* profile */
.prof-card{background:var(--s1);border:1px solid var(--line);border-radius:13px;padding:20px;text-align:center;margin-bottom:13px}
.prof-name{font-family:'Playfair Display',serif;font-style:italic;font-size:23px;font-weight:500}
.prof-handle{font-size:11.5px;color:var(--txt3);margin-top:3px;font-family:'JetBrains Mono',monospace}
.prof-niche{font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--lime);font-weight:600;margin-top:7px}
.prof-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
.prof-stat .v{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600}
.prof-stat .l{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--txt3);font-weight:600;margin-top:3px}

.settings-card{background:var(--s1);border:1px solid var(--line);border-radius:13px;padding:16px;margin-bottom:13px}
.settings-h{font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--txt3);font-weight:600;margin-bottom:11px}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px;gap:10px}
.setting-row:last-child{border-bottom:0}
.setting-row small{color:var(--txt3);display:block;font-size:10.5px;margin-top:2px}

.voice-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.voice-chip{background:var(--s2);border:1px solid var(--line);padding:6px 10px;border-radius:8px;font-size:11px;color:var(--txt);font-style:italic;display:flex;align-items:center;gap:6px}
.voice-chip .x{color:var(--txt3);cursor:pointer;font-weight:700}

/* mini chart */
.mini-chart{display:flex;align-items:flex-end;gap:5px;height:80px;margin-top:11px;padding-bottom:18px;border-bottom:1px dashed var(--line);position:relative}
.mini-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative}
.mini-bar{width:100%;background:rgba(184,255,78,.3);border-radius:3px 3px 0 0;height:0;transition:height .9s cubic-bezier(.2,.8,.2,1)}
.mini-bar.cur{background:var(--lime)}
.mini-bar.cyan{background:rgba(78,255,224,.3)}
.mini-bar.cyan.cur{background:var(--cyan)}
.mini-lbl{position:absolute;bottom:-16px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--txt3)}

/* sparkline */
.spark{display:flex;align-items:flex-end;gap:2px;height:24px;width:80px}
.spark-bar{flex:1;background:var(--lime);border-radius:1px;opacity:.6;min-height:2px}
.spark-bar:last-child{opacity:1}

/* inline edit */
.editable{padding:4px 8px;border-radius:6px;cursor:text;display:inline-block;border:1px dashed transparent;transition:.15s}
.editable:hover{border-color:var(--line2);background:var(--s2)}

/* profile detail back */
.back-btn{background:var(--s2);border:1px solid var(--line);color:var(--txt2);padding:7px 12px;border-radius:9px;font-size:11.5px;font-weight:600;display:inline-flex;align-items:center;gap:5px;margin-bottom:14px;cursor:pointer}
.back-btn:hover{color:var(--txt);background:var(--s3)}

/* profile big header */
.prof-big{background:var(--s1);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:14px;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.prof-big-meta{flex:1;min-width:200px}
.prof-big-name{font-family:'Playfair Display',serif;font-style:italic;font-size:30px;font-weight:500;letter-spacing:-.02em}
.prof-big-sub{font-size:13px;color:var(--txt2);margin-top:5px;display:flex;flex-wrap:wrap;gap:9px;align-items:center}
.prof-big-sub .dot{width:3px;height:3px;background:var(--txt3);border-radius:50%}
.delta-box{background:var(--s2);border:1px solid var(--line);border-radius:11px;padding:13px;text-align:center}
.delta-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.delta-l{font-size:9.5px;color:var(--txt3);letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:6px}
.delta-v{font-family:'JetBrains Mono',monospace;font-size:14px}
.delta-base{color:var(--txt3);font-size:11px;font-family:'JetBrains Mono',monospace}
.delta-arrow{color:var(--txt3);margin:0 4px}
.delta-now{color:var(--txt);font-weight:600}
.delta-pct{color:var(--lime);font-size:10.5px;font-weight:600;margin-top:3px}

/* mobile */
@media (max-width:768px){
  .app-shell{grid-template-columns:54px 1fr}
  .logo{font-size:0;padding:0 0 14px;text-align:center}
  .logo::before{content:'b';font-family:'Playfair Display',serif;font-style:italic;font-size:28px;color:var(--lime)}
  .logo small{display:none}
  .nav-section{display:none}
  .nav-item{justify-content:center;padding:10px;font-size:0;border-radius:8px}
  .nav-item .ico{font-size:14px}
  .nav-item .badge{display:none}
  .view-switch{flex-direction:column;padding:3px}
  .view-btn{font-size:0;padding:7px}
  .view-btn::before{font-size:9px}
  .view-btn.op-btn::before{content:'OP'}
  .view-btn.cr-btn::before{content:'CR'}
  .user-chip{justify-content:center}

// ====== utils ======
const $ = s => document.querySelector(s);
const fmt = n => n>=1000 ? (n/1000).toFixed(1).replace(/\.0$/,'')+'K' : String(n);
const esc = s => String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const NICHES = ['Luxury Wellness','Lifestyle','Food','Wellness','Nightlife','Fashion','Beauty'];

function toast(t,b,type='success'){
  const w=$('#toast-wrap');const el=document.createElement('div');
  el.className='toast '+(type==='error'?'error':type==='info'?'info':'');
  el.innerHTML=`<div class="t">${esc(t)}</div><div class="b">${esc(b)}</div>`;
  w.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(20px)';setTimeout(()=>el.remove(),300)},3500);
}
function avatar(c,size=36){
  if(!c) return '';
  return `<div class="av" style="width:${size}px;height:${size}px;font-size:${Math.max(10,size*.32)}px;background:${c.avatarGradient}">${c.avatarInitials}</div>`;
}
function tierBadge(t){return `<span class="tier ${t}">${t.toUpperCase()}</span>`}
function engBar(rate,max=6){const pct=Math.min(100,(rate/max)*100);return `<div class="bar-cell"><div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div><span class="mono" style="font-size:11.5px">${rate.toFixed(1)}%</span></div>`}
function marketRate(c){
  const baseLow = Math.round((c.followers/1000)*40);
  const baseHigh = Math.round((c.followers/1000)*55);
  const erMult = c.engagementRate >= 4 ? 1.15 : c.engagementRate >= 3 ? 1 : 0.8;
  return { reelLow: Math.round(baseLow*erMult/50)*50, reelHigh: Math.round(baseHigh*erMult/50)*50 };
}
function unreadNotifCount(){return STATE.notifications.filter(n=>!n.read).length}
function unreadDmCount(creatorId){
  let n=0;
  Object.values(STATE.dmThreads).forEach(t=>{if(t.participants.includes(creatorId)) n+=t.unread||0});
  return n;
}
function activeFlagCount(){return STATE.flags.filter(f=>!f.resolved).length}

function renderCrFeed(c){
  const matched = STATE.intelPosts.filter(p=>!p.isArchived && p.targetNiches.includes(c.niche) && p.targetTiers.includes(c.tier)).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const unread = matched.filter(p=>!STATE.expandedFeed[p.id]).length;
  const hour = new Date().getHours();
  const greet = hour<12?'Good morning':hour<18?'Good afternoon':'Good evening';
  return `
    <div class="cr-header">
      <div class="cr-greet">${greet}</div>
      <div class="cr-name-big">${esc(c.name.split(' ')[0])} 👋</div>
      <div class="cr-sub"><b>${unread} new ${unread===1?'update':'updates'}</b> from your intelligence feed</div>
    </div>
    ${matched.length===0?`<div style="text-align:center;color:var(--txt3);padding:40px 20px;font-size:13px">No drops match your niche right now. Check back soon.</div>`:matched.map(p=>renderFeedCard(p,c)).join('')}
  `;
}
function renderFeedCard(p, c){
  const open = !!STATE.expandedFeed[p.id];
  const fb = STATE.feedFb[p.id];
  const validMs = new Date(p.validUntil) - Date.now();
  const expSoon = validMs > 0 && validMs < 1000*60*60*48;
  const expLabel = expSoon ? `Expires in ${Math.floor(validMs/(1000*60*60))}h` : '';
  const catLabel = p.category[0].toUpperCase()+p.category.slice(1)+' drop';
  const recs = {
    venue:[['Post window','7–9 PM'],['Avg ER · venue','4.8%'],['Format','Reel · 30–45s'],['Confidence',p.confidence]],
    trend:[['Best window','7–9 AM'],['Sample','42 posts'],['Lift','+34%'],['Confidence',p.confidence]],
    brand:[['Offered',p.body.match(/\$[\d,]+/)?.[0]||'See body'],['Your market','$2,000–2,400'],['Brief','1 Reel'],['Deadline','7 days']],
    collab:[['Reach','82K combined'],['Overlap','68%'],['ER lift','+0.6–1.2pp'],['Effort','2 shoots']],
    alert:[['Action','Review now'],['Severity',p.confidence],['Window','Immediate'],['Confidence',p.confidence]]
  }[p.category]||[];
  return `
    <div class="feed-card ${p.category} ${open?'open':!STATE.expandedFeed[p.id+'_seen']?'unread':''}" data-act="feed-toggle" data-id="${p.id}">
      <div class="feed-cat">${esc(catLabel)}</div>
      <div class="feed-title">${esc(p.title)}</div>
      <div class="feed-time">${new Date(p.createdAt).toLocaleString('en-US',{hour:'numeric',minute:'2-digit'})} · ${expLabel||'valid until '+new Date(p.validUntil).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      <div class="feed-expand">
        ${esc(p.body)}
        <div class="feed-meta-grid">${recs.map(([k,v])=>`<div><div class="k">${k}</div><div class="v">${esc(v)}</div></div>`).join('')}</div>
        <button class="btn primary full" data-act="add-to-cal" data-id="${p.id}" onclick="event.stopPropagation()">+ Add to Calendar</button>
        <div class="feed-fb" onclick="event.stopPropagation()">
          <button class="fb-btn ${fb==='good'?'on':''}" data-act="feed-fb" data-id="${p.id}" data-v="good">✓ Useful</button>
          <button class="fb-btn bad ${fb==='bad'?'on':''}" data-act="feed-fb" data-id="${p.id}" data-v="bad">✗ Not useful</button>
          <button class="fb-btn act ${fb==='act'?'on':''}" data-act="feed-fb" data-id="${p.id}" data-v="act">🎯 Acted on</button>
        </div>
      </div>
    </div>
  `;
}

function renderCalendarGrid(){
  const grid=$('#cal-grid');if(!grid)return;
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames=['S','M','T','W','T','F','S'];
  let html=dayNames.map(d=>`<div class="cal-dh">${d}</div>`).join('');
  const first=new Date(STATE.selCalYear,STATE.selCalMonth,1);
  const startDay=first.getDay();
  const dim=new Date(STATE.selCalYear,STATE.selCalMonth+1,0).getDate();
  const today=(STATE.selCalYear===2026 && STATE.selCalMonth===3)?23:-1;
  const bks=STATE.bookings[STATE.currentCreatorId]||[];
  for(let i=0;i<startDay;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const cls=[];
    if(d===today) cls.push('today');
    if(d===STATE.selCalDay) cls.push('sel');
    const dayBookings = bks.filter(b=>{const bd=new Date(b.dateTime);return bd.getFullYear()===STATE.selCalYear && bd.getMonth()===STATE.selCalMonth && bd.getDate()===d});
    const types = [...new Set(dayBookings.map(b=>bookingDot(b.type)))];
    html+=`<div class="cal-day ${cls.join(' ')}" data-act="cal-day" data-d="${d}"><span>${d}</span>${types.length?`<div class="cal-dots">${types.map(t=>`<div class="cal-dot ${t}"></div>`).join('')}</div>`:''}</div>`;
  }
  grid.innerHTML=html;
  // agenda
  renderAgenda();
}
function renderAgenda(){
  const head=$('#agenda-head');const body=$('#agenda-body');if(!head||!body)return;
  const bks=(STATE.bookings[STATE.currentCreatorId]||[]).filter(b=>{const bd=new Date(b.dateTime);return bd.getFullYear()===STATE.selCalYear && bd.getMonth()===STATE.selCalMonth && bd.getDate()===STATE.selCalDay}).sort((a,b)=>new Date(a.dateTime)-new Date(b.dateTime));
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const date=new Date(STATE.selCalYear,STATE.selCalMonth,STATE.selCalDay);
  const isToday=(STATE.selCalYear===2026 && STATE.selCalMonth===3 && STATE.selCalDay===23);
  head.textContent=`${isToday?'Today · ':''}${dayNames[date.getDay()]} ${monthNames[STATE.selCalMonth]} ${STATE.selCalDay}`;
  if(bks.length===0){body.innerHTML=`<div style="text-align:center;color:var(--txt3);padding:24px 0;font-size:12.5px">Nothing on the calendar.</div>`;return}
  body.innerHTML=bks.map(b=>`
    <div class="agenda-item ${b.status==='cancelled'?'cancelled':''}" data-act="open-event" data-id="${b.id}">
      <div class="agenda-time">${timeFromIso(b.dateTime)}</div>
      <div class="agenda-bar ${bookingDot(b.type)}"></div>
      <div class="agenda-body">
        <div class="agenda-title">${esc(b.venue)}</div>

function buildChart(id,data,max,suffix,cyan){
  const el=document.getElementById(id);if(!el)return;
  el.querySelectorAll('.bar-col').forEach(x=>x.remove());
  data.forEach((v,i)=>{
    const col=document.createElement('div');col.className='bar-col';
    const cur=i===data.length-1;
    const bar=document.createElement('div');bar.className='bar-bar'+(cyan?' cyan':'')+(cur?' cur':'');bar.style.height='0';
    const tip=document.createElement('div');tip.className='bar-tip';tip.textContent='W'+(i+1)+': '+v+suffix;
    const lbl=document.createElement('div');lbl.className='bar-lbl';lbl.textContent='W'+(i+1);
    bar.appendChild(tip);col.appendChild(bar);col.appendChild(lbl);el.appendChild(col);
    setTimeout(()=>bar.style.height=((v/max)*100)+'%',60+i*70);
  });
}

  });
}

// ====== EVENT DELEGATION ======
document.addEventListener('click', e=>{
  const t = e.target.closest('[data-act]');
  if(!t){
    if(STATE.notifOpen && !e.target.closest('#notif-panel') && !e.target.closest('[data-act="toggle-notif"]')){
      STATE.notifOpen=false; renderTopbar();
    }
    return;
  }
  const act = t.dataset.act;
  if(act==='set-view'){ STATE.currentView=t.dataset.v; STATE.viewingCreatorId=null; STATE.viewingNetCreator=null; STATE.openDmThread=null; render(); }
  else if(act==='op-nav'){ STATE.operatorPanel=t.dataset.k; STATE.viewingCreatorId=null; render(); }
  else if(act==='cr-nav'){ STATE.creatorPanel=t.dataset.k; STATE.viewingNetCreator=null; STATE.openDmThread=null; render(); }
  else if(act==='toggle-notif'){ e.stopPropagation(); STATE.notifOpen=!STATE.notifOpen; renderTopbar(); }
  else if(act==='mark-all-read'){ STATE.notifications.forEach(n=>n.read=true); renderTopbar(); }
  else if(act==='notif-click'){ const n=STATE.notifications.find(x=>x.id===t.dataset.id); if(n){n.read=true; if(n.link==='flags'){STATE.currentView='operator';STATE.operatorPanel='flags'} else if(n.link==='hotdrop'){STATE.currentView='operator';STATE.operatorPanel='hotdrop'} else if(n.link==='analytics'){STATE.currentView='operator';STATE.operatorPanel='analytics'} STATE.notifOpen=false; render();} }
  else handleAction(act, t, e);
});

// ====== ACTION HANDLER ======
function handleAction(act, t, e){
  // operator dashboard navigation shortcuts
  if(act==='goto-hotdrop'){STATE.operatorPanel='hotdrop';render();return}
  if(act==='goto-roster'){STATE.operatorPanel='roster';render();return}
  if(act==='open-profile'){STATE.viewingCreatorId=t.dataset.id;STATE.profileTab='overview';render();return}
  if(act==='back-roster'){STATE.viewingCreatorId=null;STATE.operatorPanel='roster';render();return}
  if(act==='prof-tab'){STATE.profileTab=t.dataset.v;render();return}
  if(act==='toggle-active'){const c=STATE.creators[t.dataset.id];c.active=!c.active;toast('Status updated',`${c.name} is now ${c.active?'active':'inactive'}`);render();return}
  if(act==='roster-search'){STATE.rosterFilter.search=t.value;render();const i=$('#roster-search');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length)};return}
  if(act==='roster-tier'){STATE.rosterFilter.tier=t.value;render();return}
  if(act==='roster-niche'){STATE.rosterFilter.niche=t.value;render();return}
  if(act==='roster-active'){STATE.rosterFilter.activeOnly=t.checked;render();return}

  // composer
  if(act==='cmp-cat'){STATE.composer.category=t.dataset.v;render();return}
  if(act==='cmp-conf'){STATE.composer.confidence=t.dataset.v;render();return}
  if(act==='cmp-niche'){const v=t.dataset.v;const arr=STATE.composer.niches;const i=arr.indexOf(v);if(i>=0)arr.splice(i,1);else arr.push(v);commitComposerForm();render();return}
  if(act==='cmp-tier'){const v=t.dataset.v;const arr=STATE.composer.tiers;const i=arr.indexOf(v);if(i>=0)arr.splice(i,1);else arr.push(v);commitComposerForm();render();return}
  if(act==='cmp-publish'){
    commitComposerForm();
    const c=STATE.composer;
    if(!c.title||!c.body){toast('Missing fields','Title and body are required','error');return}
    if(c.editingId){
      const p=STATE.intelPosts.find(x=>x.id===c.editingId);
      Object.assign(p,{title:c.title,body:c.body,source:c.source,confidence:c.confidence,validUntil:c.validUntil,category:c.category,targetNiches:[...c.niches],targetTiers:[...c.tiers],city:c.city});
      toast('Hot Drop updated','Changes propagated to all creator feeds');
    } else {
      const reach=Object.values(STATE.creators).filter(cr=>cr.active && c.niches.includes(cr.niche) && c.tiers.includes(cr.tier)).length;
      const newPost={id:'intel'+Date.now(),title:c.title,body:c.body,category:c.category,source:c.source,confidence:c.confidence,targetNiches:[...c.niches],targetTiers:[...c.tiers],city:c.city,validUntil:c.validUntil||'2026-12-31T23:59:00',isPublished:true,isArchived:false,pushCount:reach,readCount:0,usefulCount:0,actedOnCount:0,createdAt:new Date().toISOString()};
      STATE.intelPosts.unshift(newPost);
      STATE.notifications.unshift({id:'n'+Date.now(),icon:'⚡',title:'Hot Drop pushed to '+reach+' creators',body:c.title.slice(0,50),time:'just now',read:false,link:'hotdrop'});
      toast('🔥 Hot Drop published',`Pushed to ${reach} creator${reach===1?'':'s'}`);
    }
    STATE.composer={title:'',body:'',source:'',confidence:'high',validUntil:'',category:'venue',niches:[],tiers:[],city:'Miami',editingId:null};
    render();return;
  }
  if(act==='cmp-preview'){commitComposerForm();openOverlay(renderPreviewModal());return}
  if(act==='cmp-draft'){commitComposerForm();toast('Draft saved','Stored locally for this session');return}
  if(act==='cancel-edit'){STATE.composer={title:'',body:'',source:'',confidence:'high',validUntil:'',category:'venue',niches:[],tiers:[],city:'Miami',editingId:null};render();return}
  if(act==='drop-edit'){const p=STATE.intelPosts.find(x=>x.id===t.dataset.id);STATE.composer={title:p.title,body:p.body,source:p.source,confidence:p.confidence,validUntil:p.validUntil,category:p.category,niches:[...p.targetNiches],tiers:[...p.targetTiers],city:p.city,editingId:p.id};render();window.scrollTo(0,0);return}
  if(act==='drop-dup'){const p=STATE.intelPosts.find(x=>x.id===t.dataset.id);const np={...p,id:'intel'+Date.now(),title:p.title+' (copy)',pushCount:0,readCount:0,usefulCount:0,actedOnCount:0,createdAt:new Date().toISOString()};STATE.intelPosts.unshift(np);toast('Duplicated','New draft created');render();return}
  if(act==='drop-arch'){const p=STATE.intelPosts.find(x=>x.id===t.dataset.id);p.isArchived=!p.isArchived;toast(p.isArchived?'Archived':'Unarchived','');render();return}
  if(act==='drop-filter-cat'){STATE.dropFilter.category=t.dataset.v;render();return}
  if(act==='drop-filter-status'){STATE.dropFilter.status=t.dataset.v;render();return}

  // flags
  if(act==='flag-tab'){STATE.flagTab=t.dataset.v;render();return}
  if(act==='expand-flag'){STATE.expandedFlag=STATE.expandedFlag===t.dataset.id?null:t.dataset.id;render();return}
  if(act==='resolve-flag'){const f=STATE.flags.find(x=>x.id===t.dataset.id);f.resolved=true;toast('Flag resolved','Creator notified · thread archived');render();return}
  if(act==='reply-flag'){STATE.expandedFlag=t.dataset.id;render();setTimeout(()=>{const i=$('#reply-'+t.dataset.id);if(i)i.focus()},50);return}
  if(act==='send-reply'){const id=t.dataset.id;const f=STATE.flags.find(x=>x.id===id);const i=$('#reply-'+id);if(!i||!i.value.trim())return;const text=i.value.trim();if(!STATE.messages[f.creatorId])STATE.messages[f.creatorId]=[];STATE.messages[f.creatorId].push({id:'m'+Date.now(),role:'bot',content:'Maya: '+text,time:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})});f.resolved=true;toast('Reply sent',`Message delivered to ${STATE.creators[f.creatorId].name}`);render();return}
  if(act==='add-note'){const id=t.dataset.id;const i=$('#note-input');if(!i||!i.value.trim())return;if(!STATE.notes[id])STATE.notes[id]=[];STATE.notes[id].push({op:'Maya',time:new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}),text:i.value.trim()});toast('Note added','');render();return}
  if(act==='op-add-booking'){openSheet(renderBookingSheet(t.dataset.id));return}
  if(act==='op-log-perf'){openSheet(renderLogPerfSheet(t.dataset.id));return}
  if(act==='edit-creator'){openOverlay(renderEditCreatorModal(t.dataset.id));return}
  if(act==='open-log-perf'){openSheet(renderLogPerfSheet(STATE.viewingCreatorId||'sofia'));return}
  if(act==='open-add-creator'){openOverlay(renderAddCreatorModal());return}

  // analytics
  if(act==='export-csv'){exportCsv();return}

  // bot config
  if(act==='save-bot-name'){const n=$('#bot-name-input').value.trim();const p=$('#platform-name-input').value.trim();if(n)STATE.settings.botName=n;if(p)STATE.settings.platformName=p;toast('Updated',`Bot is now "${STATE.settings.botName}" — propagated everywhere`);render();return}

  // creator switching
  if(act==='switch-creator'){STATE.currentCreatorId=t.value;if(!STATE.bookings[t.value])STATE.bookings[t.value]=[];if(!STATE.messages[t.value])STATE.messages[t.value]=[{id:'m1',role:'bot',content:`Hey ${STATE.creators[t.value].name.split(' ')[0]} — I'm ${STATE.settings.botName}. I've got your schedule, your stats, and the city. Ask me anything.`,time:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}];render();return}

  // feed
  if(act==='feed-toggle'){const id=t.dataset.id;STATE.expandedFeed[id]=!STATE.expandedFeed[id];STATE.expandedFeed[id+'_seen']=true;render();return}
  if(act==='feed-fb'){STATE.feedFb[t.dataset.id]=t.dataset.v;const p=STATE.intelPosts.find(x=>x.id===t.dataset.id);if(p){if(t.dataset.v==='good')p.usefulCount++;else if(t.dataset.v==='act')p.actedOnCount++}toast('Feedback recorded','Helps us tune your feed');render();return}
  if(act==='add-to-cal'){const p=STATE.intelPosts.find(x=>x.id===t.dataset.id);const cid=STATE.currentCreatorId;if(!STATE.bookings[cid])STATE.bookings[cid]=[];const dt=p.category==='venue'?'2026-04-23T19:00:00':p.category==='brand'?'2026-04-25T12:30:00':p.category==='collab'?'2026-04-28T09:00:00':'2026-04-23T20:00:00';STATE.bookings[cid].push({id:'b'+Date.now(),venue:p.title.slice(0,40),type:p.category==='brand'?'brand':p.category==='collab'?'collab':'event',dateTime:dt,notes:p.body.slice(0,80),status:'pending',createdByBot:true});toast('Added to calendar',p.title.slice(0,50));render();return}

  // chat
  if(act==='chat-send'){sendChat();return}
  if(act==='quick-msg'){const i=$('#chat-input');i.value=t.dataset.v;sendChat();return}
  if(act==='ask-draft-dm'){openSheet(renderDraftDmSheet(null));return}

  // calendar
  if(act==='cal-prev'){STATE.selCalMonth--;if(STATE.selCalMonth<0){STATE.selCalMonth=11;STATE.selCalYear--}STATE.selCalDay=1;render();return}
  if(act==='cal-next'){STATE.selCalMonth++;if(STATE.selCalMonth>11){STATE.selCalMonth=0;STATE.selCalYear++}STATE.selCalDay=1;render();return}
  if(act==='cal-day'){STATE.selCalDay=parseInt(t.dataset.d);renderCalendarGrid();return}
  if(act==='open-event'){openSheet(renderEventDetailSheet(t.dataset.id));return}
  if(act==='open-book-sheet'){openSheet(renderBookingSheet(STATE.currentCreatorId));return}

  // network
  if(act==='net-section'){STATE.networkSection=t.dataset.v;render();return}
  if(act==='net-search'){STATE.rosterFilter.search=t.value;render();const i=$('#net-search');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length)};return}
  if(act==='net-niche'){STATE.rosterFilter.niche=t.dataset.v;render();return}
  if(act==='net-view'){STATE.viewingNetCreator=t.dataset.id;render();return}
  if(act==='net-back'){STATE.viewingNetCreator=null;render();return}
  if(act==='net-connect'){const c=STATE.creators[STATE.currentCreatorId];const id=t.dataset.id;c.connections=c.connections||[];const i=c.connections.indexOf(id);if(i>=0){c.connections.splice(i,1);toast('Disconnected','')}else{c.connections.push(id);toast('Connected',`You can now message ${STATE.creators[id].name.split(' ')[0]}`)}render();return}
  if(act==='net-message'){const c=STATE.creators[STATE.currentCreatorId];const id=t.dataset.id;const key=[c.id,id].sort().join('-');if(!STATE.dmThreads[key])STATE.dmThreads[key]={participants:[c.id,id],messages:[],unread:0};STATE.viewingNetCreator=null;STATE.networkSection='dms';STATE.openDmThread=key;render();return}
  if(act==='suggest-collab'){toast('Collab suggested',`${STATE.settings.botName} will reach out to coordinate`);return}
  if(act==='collab-sub'){STATE.networkSubTab=t.dataset.v;render();return}
  if(act==='collab-interest'){const p=STATE.collabPosts.find(x=>x.id===t.dataset.id);const cid=STATE.currentCreatorId;const i=p.interested.indexOf(cid);if(i>=0)p.interested.splice(i,1);else{p.interested.push(cid);toast('Interest sent',`${STATE.settings.botName} will set it up`)}render();return}
  if(act==='open-post-collab'){openOverlay(renderPostCollabModal());return}

  // dms
  if(act==='open-dm'){const t2=STATE.dmThreads[t.dataset.k];t2.unread=0;t2.messages.forEach(m=>m.read=true);STATE.openDmThread=t.dataset.k;render();return}
  if(act==='dm-back'){STATE.openDmThread=null;render();return}
  if(act==='dm-typing'){
    const slot=$('#dm-typing-slot');if(!slot)return;
    if(t.value.trim()){
      clearTimeout(window._dmTypingTimer);
      const other=STATE.creators[STATE.dmThreads[STATE.openDmThread].participants.find(x=>x!==STATE.currentCreatorId)];
      slot.innerHTML=`<div class="msg bot" style="font-style:italic;opacity:.7">${esc(other.name.split(' ')[0])} is typing…</div>`;
      window._dmTypingTimer=setTimeout(()=>{slot.innerHTML=''},2000);
    }
    return;
  }
  if(act==='dm-send'){const k=t.dataset.k;const i=$('#dm-input');if(!i||!i.value.trim())return;const text=i.value.trim();const time=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});STATE.dmThreads[k].messages.push({from:STATE.currentCreatorId,content:text,time,read:true});i.value='';render();return}
  if(act==='dm-draft'){openSheet(renderDraftDmSheet(t.dataset.k));return}

  // creator profile edits
  if(act==='cr-bio-input'){const i=$('#cr-bio');const cnt=$('#cr-bio-count');if(cnt)cnt.textContent=`${i.value.length}/200`;return}
  if(act==='cr-save-bio'){const c=STATE.creators[STATE.currentCreatorId];const v=$('#cr-bio').value;c.bio=v;toast('Bio saved','Updated everywhere');render();return}
  if(act==='cr-save-bot-name'){const v=$('#cr-bot-name').value.trim();if(v){STATE.settings.botName=v;toast('Bot name updated',`Now "${v}" everywhere`);render()};return}
  if(act==='cr-toggle-notif'){const c=STATE.creators[STATE.currentCreatorId];c.notificationSettings[t.dataset.k]=t.checked;toast('Setting updated','');return}
  if(act==='cr-edit-profile'){openOverlay(renderEditCreatorModal(STATE.currentCreatorId));return}
  if(act==='add-voice'){const c=STATE.creators[STATE.currentCreatorId];const i=$('#voice-add');if(!i||!i.value.trim())return;c.voiceProfile=c.voiceProfile||[];c.voiceProfile.push(i.value.trim());toast('Voice example added','');render();return}
  if(act==='remove-voice'){const c=STATE.creators[STATE.currentCreatorId];c.voiceProfile.splice(parseInt(t.dataset.i),1);render();return}
  if(act==='open-log-post'){openSheet(renderLogPostSheet());return}
  if(act==='data-export'){toast('Preparing your data export…','You\'ll receive an email shortly','info');return}

  // overlay/sheet close
  if(act==='close-overlay'){closeOverlay();return}
  if(act==='close-sheet'){closeSheet();return}
}

// ====== CHAT (Aria) ======
function ariaReply(q, c){
  const s=q.toLowerCase();
  const bn=STATE.settings.botName;
  if(/book|reserve|table/.test(s)) return `On it. I'll send the request and add a hold to your calendar — you'll get a confirm the moment they reply. Want me to suggest 3 spots based on what's hitting this week?`;
  if(/remind|reminder/.test(s)) return `Reminder set ✓ I'll ping you 30 min before — text + push.`;
  if(/calendar|schedule|what's on|whats on|week/.test(s)){const bks=(STATE.bookings[c.id]||[]).slice(0,4);return `This week:\n\n${bks.map(b=>'• '+new Date(b.dateTime).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+' '+timeFromIso(b.dateTime)+' — '+b.venue).join('\n')}\n\nWant me to send it as a digest?`}
  if(/engagement|stats/.test(s)) return `You're at ${c.engagementRate}% engagement, up from ${c.baselineEngagement}%. That puts you in the top quartile of micro creators in Miami. Posting cadence is ${c.postsPerWeek}/wk vs the ${c.baselinePostsPerWeek} baseline.`;
  if(/follower|growth/.test(s)){const last=c.performance?c.performance[c.performance.length-1]:{followerDelta:0};return `${fmt(c.followers)} followers right now. +${fmt(last.followerDelta)} this week. At this pace, you'll hit ${fmt(c.followers+5000)} by end of month.`}
  if(/post|film|content|what should/.test(s)){const drop=STATE.intelPosts.find(p=>p.targetNiches.includes(c.niche));if(drop)return `Top of your feed: ${drop.title}\n\n${drop.body.slice(0,180)}…\n\nWant me to add it to your calendar?`;return `Nothing urgent on the feed. Coast — tomorrow morning is your golden hour.`}
  if(/deal|aesop|brand|negotiate/.test(s)){const r=marketRate(c);return `Flagging that to your manager — brand deal negotiation is their lane 🎯\n\nContext for you: at ${c.engagementRate}% ER and ${fmt(c.followers)} followers, your market rate for a sponsored Reel is $${fmt(r.reelLow)}–$${fmt(r.reelHigh)}. The Aesop $1,800 is below market — your manager will counter at $2,200.`}
  if(/rate|worth|value|charge/.test(s)){const r=marketRate(c);return `Your market rates:\n\n• Sponsored Reel: $${fmt(r.reelLow)}–$${fmt(r.reelHigh)}\n• Static post: $${fmt(r.reelLow*.55|0)}–$${fmt(r.reelHigh*.55|0)}\n• Story bundle (3): $${fmt(r.reelLow*.4|0)}\n\nBased on followers + ER + ${c.neighborhood} positioning.`}
  if(/draft|write|dm/.test(s)) return `I can draft a DM for you. Tell me who and what topic — I'll match your voice ("${(c.voiceProfile||['direct, low-effort'])[0]}") and you can send it manually.`;
  if(/name|rename/.test(s)) return `You can rename me anytime in Profile → Sub-bot. The change propagates everywhere — I'll just answer to whatever you call me.`;
  if(/nia|collab/.test(s)) return `Nia's wellness morning series: 4 weeks, 2 shoots from you, cross-post. Audience overlap 68%, expected ER bump +0.6–1.2pp. Want me to lock in shoot 1 for Tuesday morning?`;
  if(/hi|hello|hey|morning/.test(s)) return `Hey ${c.name.split(' ')[0]} ☀️ I've got eyes on your schedule, your stats, and the city. What do you need?`;
  return `Got it. I'll handle it — ping you when there's something to confirm.`;
}
function sendChat(){
  const i=$('#chat-input');if(!i||!i.value.trim())return;
  const c=STATE.creators[STATE.currentCreatorId];
  const text=i.value.trim();
  const time=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  if(!STATE.messages[c.id])STATE.messages[c.id]=[];
  STATE.messages[c.id].push({id:'m'+Date.now(),role:'user',content:text,time});
  i.value='';
  render();
  // typing indicator + streaming
  setTimeout(()=>{
    const m=$('#chat-msgs');if(!m)return;
    const typ=document.createElement('div');typ.className='typing';typ.innerHTML='<span></span><span></span><span></span>';m.appendChild(typ);m.scrollTop=m.scrollHeight;
    setTimeout(()=>{
      typ.remove();
      const reply=ariaReply(text,c);
      const el=document.createElement('div');el.className='msg bot';m.appendChild(el);
      const words=reply.split(' ');let idx=0;
      const tick=()=>{if(idx>=words.length){
        STATE.messages[c.id].push({id:'m'+Date.now(),role:'bot',content:reply,time:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})});
        return}
        el.textContent=words.slice(0,idx+1).join(' ');m.scrollTop=m.scrollHeight;idx++;setTimeout(tick,40);
      };
      tick();
    },1100+Math.random()*400);
  },80);
}

function exportCsv(){

  STATE.pilotStats.weeklyPosts.forEach((p,i)=>rows.push([i+1,p,STATE.pilotStats.weeklyER[i]]));
  rows.push([]);rows.push(['creator','followers','er','tier','posts_per_week','active']);
  Object.values(STATE.creators).forEach(c=>rows.push([c.name,c.followers,c.engagementRate,c.tier,c.postsPerWeek,c.active]));
  const csv=rows.map(r=>r.join(',')).join('\n');

  const a=document.createElement('a');a.href=url;a.download='babyg_pilot_w6.csv';a.click();

  toast('CSV exported','babyg_pilot_w6.csv downloaded');
}

  else if(t.id==='roster-search'){STATE.rosterFilter.search=t.value;render();const i=$('#roster-search');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length)}}
  else if(t.id==='roster-tier'){STATE.rosterFilter.tier=t.value;render()}
  else if(t.id==='roster-niche'){STATE.rosterFilter.niche=t.value;render()}
  else if(t.id==='net-search'){STATE.rosterFilter.search=t.value;render();const i=$('#net-search');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length)}}
  else if(t.dataset && t.dataset.act==='roster-active'){STATE.rosterFilter.activeOnly=t.checked;render()}
  else if(t.id==='cr-bio'){const cnt=$('#cr-bio-count');if(cnt)cnt.textContent=`${t.value.length}/200`}
  else if(t.dataset && t.dataset.act==='cr-toggle-notif'){const c=STATE.creators[STATE.currentCreatorId];c.notificationSettings[t.dataset.k]=t.checked}
  else if(t.dataset && t.dataset.act==='dm-typing'){
    const slot=$('#dm-typing-slot');if(!slot)return;
    if(t.value.trim()){
      clearTimeout(window._dmTypingTimer);
      const other=STATE.creators[STATE.dmThreads[STATE.openDmThread].participants.find(x=>x!==STATE.currentCreatorId)];
      slot.innerHTML=`<div class="msg bot" style="font-style:italic;opacity:.7">${esc(other.name.split(' ')[0])} is typing…</div>`;
      window._dmTypingTimer=setTimeout(()=>{slot.innerHTML=''},2000);
    }
  }
});
document.addEventListener('change',e=>{
  const t=e.target;
  if(t.dataset && t.dataset.act==='switch-creator'){STATE.currentCreatorId=t.value;render()}
});
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const t=e.target;
    if(t.id==='chat-input'){e.preventDefault();sendChat()}
    else if(t.id==='dm-input'){
      e.preventDefault();
      const k=STATE.openDmThread;if(!k)return;
      const text=t.value.trim();if(!text)return;
      const time=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      STATE.dmThreads[k].messages.push({from:STATE.currentCreatorId,content:text,time,read:true});
      t.value='';render();
    }
    else if(t.id==='voice-add'){e.preventDefault();const c=STATE.creators[STATE.currentCreatorId];if(!t.value.trim())return;c.voiceProfile=c.voiceProfile||[];c.voiceProfile.push(t.value.trim());render()}
  }
});

// initial render
render();
</script>
</body>
</html>
