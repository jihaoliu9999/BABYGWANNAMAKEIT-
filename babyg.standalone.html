document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 var(--bone);\n    --ink-mid: #b8b3a8;\n    --ink-dim: #7a766f;\n    --ink-faint: #4a4742;\n\n    /* hot accent — electric coral */\n    --lime: #FF4D6D;\n    --lime-dim: #E0395B;\n    --lime-soft: rgba(255,77,109,0.12);\n\n    /* badge red kept */\n    --accent: #e85a4f;\n    --accent-bg: rgba(232,90,79,0.10);\n\n    /* chrome palette */\n    --chrome-1: #d8dde6;\n    --chrome-2: #8e9cb8;\n    --chrome-3: #cbc9d8;\n\n    --sans: \"Helvetica Neue\", \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Helvetica, Arial, sans-serif;\n    --mono: \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n\n    --display-track: -0.045em;\n    --display-weight: 500;\n  }\n\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  html, body {\n    margin: 0;\n    background: var(--bg);\n    color: var(--ink);\n    overflow-x: hidden;\n  }\n  body {\n    font-family: var(--sans);\n    font-size: 15px;\n    line-height: 1.55;\n    font-weight: 400;\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n    text-rendering: optimizeLegibility;\n  }\n  a { color: inherit; text-decoration: none; }\n  button { font-family: inherit; }\n  ::selection { background: var(--lime); color: #fff; }\n\n  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px; }\n  .wrap-wide { max-width: 1440px; margin: 0 auto; padding: 0 32px; }\n\n  /* --------------- scroll reveal (progressive enhancement) --------------- */\n  .js-ready .reveal {\n    opacity: 0;\n    transform: translateY(28px);\n    transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1);\n    will-change: opacity, transform;\n  }\n  .js-ready .reveal.in {\n    opacity: 1;\n    transform: translateY(0);\n  }\n  .reveal.delay-1 { transition-delay: .08s; }\n  .reveal.delay-2 { transition-delay: .16s; }\n  .reveal.delay-3 { transition-delay: .24s; }\n  .reveal.delay-4 { transition-delay: .32s; }\n\n  /* --------------- header --------------- */\n  header {\n    position: fixed;\n    inset: 0 0 auto 0;\n    z-index: 100;\n    transition: background .4s ease, border-color .4s ease, backdrop-filter .4s ease;\n    border-bottom: 1px solid transparent;\n  }\n  header.is-scrolled {\n    background: rgba(10,10,10,0.75);\n    backdrop-filter: blur(18px) saturate(140%);\n    border-bottom: 1px solid var(--hairline);\n  }\n  .nav {\n    display: grid;\n    grid-template-columns: 1fr auto 1fr;\n    align-items: center;\n    padding: 18px 0;\n  }\n  .brand {\n    display: inline-flex;\n    align-items: center;\n    gap: 12px;\n    justify-self: start;\n  }\n  .brand-mark {\n    width: 34px; height: 34px;\n    border-radius: 8px;\n    display: inline-flex; align-items: center; justify-content: center;\n    overflow: hidden;\n    background: var(--obsidian);\n    border: 1px solid var(--hairline);\n  }\n  .brand-mark img {\n    width: 100%; height: 100%;\n    object-fit: contain;\n    padding: 4px;\n    filter: drop-shadow(0 0 4px rgba(160,200,255,0.5));\n  }\n  .logo-text {\n    font-weight: var(--display-weight);\n    font-size: 22px;\n    letter-spacing: var(--display-track);\n    line-height: 1;\n    color: var(--ink);\n  }\n  .navlinks {\n    display: flex;\n    align-items: center;\n    gap: 28px;\n    justify-self: center;\n    padding: 10px 26px;\n    border-radius: 999px;\n    background: rgba(20,20,20,0.45);\n    border: 1px solid var(--hairline);\n    backdrop-filter: blur(10px) saturate(140%);\n    color: var(--ink-mid);\n    font-size: 13.5px;\n    font-weight: 400;\n    box-shadow: 0 4px 20px rgba(0,0,0,0.25);\n  }\n  .navlinks a {\n    position: relative;\n    padding: 2px 0;\n    transition: color .2s ease;\n    white-space: nowrap;\n  }\n  .navlinks a::after {\n    content: \"\";\n    position: absolute;\n    bottom: -3px;\n    left: 50%;\n    transform: translateX(-50%);\n    width: 0;\n    height: 1.5px;\n    background: var(--lime);\n    border-radius: 1px;\n    box-shadow: 0 0 8px var(--lime);\n    transition: width .3s cubic-bezier(.2,.7,.2,1);\n  }\n  .navlinks a:hover { color: var(--ink); }\n  .navlinks a:hover::after { width: 100%; }\n\n  .nav-right {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    justify-self: end;\n  }\n  .btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    padding: 12px 22px;\n    border-radius: 999px;\n    font-size: 13.5px;\n    font-weight: 500;\n    font-family: inherit;\n    border: 1px solid transparent;\n    cursor: pointer;\n    line-height: 1;\n    white-space: nowrap;\n    transition: background .2s ease, color .2s ease, border-color .2s ease, transform .15s ease;\n  }\n  .btn:hover { transform: translateY(-1px); }\n  .btn-light { background: var(--bone); color: var(--obsidian); }\n  .btn-light:hover { background: #fff; }\n  .btn-lime {\n    background: var(--lime);\n    color: #fff;\n    font-weight: 500;\n  }\n  .btn-lime:hover { background: #ff6c84; }\n  .btn-ghost {\n    background: transparent;\n    color: var(--ink);\n    border: 1px solid var(--hairline-strong);\n  }\n  .btn-ghost:hover { border-color: #444; background: rgba(255,255,255,0.03); }\n  .btn-dark { background: var(--obsidian); color: var(--bone); }\n  .btn-dark:hover { background: #1c1c1c; }\n\n  /* --------------- hero --------------- */\n  .hero {\n    padding: 140px 0 120px;\n    position: relative;\n    text-align: center;\n    overflow: hidden;\n  }\n  /* Ambient glow behind logo */\n  .hero::before {\n    content: \"\";\n    position: absolute;\n    width: 900px; height: 900px;\n    left: 50%; top: 30%;\n    transform: translate(-50%, -50%);\n    background: radial-gradient(circle, rgba(120,150,200,0.18) 0%, rgba(120,150,200,0.08) 30%, transparent 65%);\n    filter: blur(40px);\n    z-index: 0;\n    pointer-events: none;\n    animation: pulse 7s ease-in-out infinite;\n  }\n  @keyframes pulse {\n    0%, 100% { opacity: 0.7; transform: translate(-50%,-50%) scale(1); }\n    50%      { opacity: 1.0; transform: translate(-50%,-50%) scale(1.08); }\n  }\n\n  .hero-eyebrow {\n    font-family: var(--mono);\n    font-size: 11px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    margin-bottom: 56px;\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    padding: 8px 16px;\n    border: 1px solid var(--hairline);\n    border-radius: 999px;\n    background: rgba(20,20,20,0.5);\n    position: relative;\n    z-index: 2;\n    white-space: nowrap;\n  }\n  .hero-eyebrow .pulse-dot {\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: var(--lime);\n    box-shadow: 0 0 12px var(--lime);\n    animation: dotpulse 2.4s steps(1) infinite;\n  }\n  @keyframes dotpulse {\n    0%, 100% { opacity: 1;   transform: scale(1);    box-shadow: 0 0 14px var(--lime); }\n    8%       { opacity: 0.2; transform: scale(0.75); box-shadow: 0 0 3px var(--lime); }\n    18%      { opacity: 1;   transform: scale(1.15); box-shadow: 0 0 18px var(--lime); }\n    24%      { opacity: 0.3; transform: scale(0.8); }\n    34%      { opacity: 1;   transform: scale(1);    box-shadow: 0 0 14px var(--lime); }\n    72%      { opacity: 1;   transform: scale(1);    box-shadow: 0 0 14px var(--lime); }\n    78%      { opacity: 0.2; transform: scale(0.75); }\n    86%      { opacity: 1;   transform: scale(1);    box-shadow: 0 0 14px var(--lime); }\n  }\n\n  /* the chrome bg logo center stage */\n  .hero-mark {\n    position: relative;\n    z-index: 2;\n    width: 280px;\n    height: 280px;\n    margin: 0 auto 48px;\n    transform-style: preserve-3d;\n    perspective: 800px;\n  }\n  .hero-mark .mark-img {\n    width: 100%;\n    height: 100%;\n    object-fit: contain;\n    animation: float 7s ease-in-out infinite;\n    filter: drop-shadow(0 0 60px rgba(160,200,255,0.55)) drop-shadow(0 0 20px rgba(255,77,109,0.25));\n    will-change: transform;\n  }\n  @keyframes float {\n    0%, 100% { transform: translateY(0) rotate(-1deg); }\n    50%      { transform: translateY(-14px) rotate(1.5deg); }\n  }\n  /* halo / shimmer ring */\n  .hero-mark::before {\n    content: \"\";\n    position: absolute;\n    inset: -40px;\n    border-radius: 50%;\n    background: conic-gradient(from 0deg,\n      rgba(255,77,109,0.0) 0deg,\n      rgba(255,77,109,0.30) 60deg,\n      rgba(160,200,255,0.0) 120deg,\n      rgba(180,200,240,0.30) 200deg,\n      rgba(255,255,255,0.0) 280deg,\n      rgba(255,77,109,0.0) 360deg);\n    filter: blur(40px);\n    opacity: 0.8;\n    animation: spin 14s linear infinite;\n    pointer-events: none;\n    z-index: -1;\n  }\n  @keyframes spin {\n    from { transform: rotate(0deg); }\n    to   { transform: rotate(360deg); }\n  }\n\n  h1.display {\n    font-weight: var(--display-weight);\n    font-size: clamp(56px, 8.4vw, 132px);\n    line-height: 0.92;\n    letter-spacing: var(--display-track);\n    margin: 0 0 32px;\n    color: var(--ink);\n    position: relative;\n    z-index: 2;\n  }\n  h1.display .chrome {\n    background: linear-gradient(180deg, #ffffff 0%, #cbd5e0 40%, #6e7c9a 75%, #aab4c8 100%);\n    -webkit-background-clip: text;\n            background-clip: text;\n    -webkit-text-fill-color: transparent;\n            color: transparent;\n    text-shadow: 0 1px 2px rgba(255,255,255,0.05);\n  }\n  h1.display .quiet { color: var(--ink-dim); }\n  .lede {\n    color: var(--ink-mid);\n    max-width: 540px;\n    margin: 0 auto 44px;\n    font-size: 17px;\n    line-height: 1.55;\n    position: relative; z-index: 2;\n  }\n  .cta-row {\n    display: inline-flex;\n    align-items: center;\n    gap: 16px;\n    position: relative; z-index: 2;\n    flex-wrap: wrap;\n    justify-content: center;\n  }\n\n  /* --------------- marquee --------------- */\n  .marquee {\n    border-top: 1px solid var(--hairline);\n    border-bottom: 1px solid var(--hairline);\n    background: var(--jet);\n    padding: 26px 0;\n    overflow: hidden;\n    position: relative;\n  }\n  .marquee-track {\n    display: flex;\n    gap: 60px;\n >\n          <li><a>instagram<\u002Fa><\u002Fli>\n          <li><a>tiktok<\u002Fa><\u002Fli>\n          <li><a>x<\u002Fa><\u002Fli>\n          <li><a>youtube<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bot\">\n      <span>© 2026 babyg · all rights reserved<\u002Fspan>\n      <span>your AI manager<\u002Fspan>\n      <span>private beta<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // mark JS ready so reveal elements get their initial hidden state.\n  // without JS, content stays visible — robust for screenshots, print, scrapers.\n  document.documentElement.classList.add('js-ready');\n\n  // --- sticky header bg ---\n  const header = document.getElementById('site-header');\n  const onScroll = () => {\n    if (window.scrollY > 8) header.classList.add('is-scrolled');\n    else header.classList.remove('is-scrolled');\n  };\n  document.addEventListener('scroll', onScroll, { passive: true });\n  onScroll();\n\n  // --- scroll reveal ---\n  // Use a simple check + observer combo. Some embed environments behave oddly\n  // with IntersectionObserver thresholds, so we ALSO check on scroll/resize.\n  const reveals = Array.from(document.querySelectorAll('.reveal'));\n  function checkReveals() {\n    const vh = window.innerHeight;\n    reveals.forEach(el => {\n      if (el.classList.contains('in')) return;\n      const r = el.getBoundingClientRect();\n      if (r.top < vh * 0.92 && r.bottom > 0) {\n        el.classList.add('in');\n      }\n    });\n  }\n  // Initial check (after layout)\n  requestAnimationFrame(() => { checkReveals(); requestAnimationFrame(checkReveals); });\n  window.addEventListener('scroll', checkReveals, { passive: true });\n  window.addEventListener('resize', checkReveals);\n\n  // --- parallax / cursor follow on hero mark ---\n  const heroMark = document.getElementById('heroMark');\n  if (heroMark) {\n    const markImg = heroMark.querySelector('.mark-img');\n    let targetX = 0, targetY = 0, curX = 0, curY = 0;\n    document.addEventListener('mousemove', (e) => {\n      const cx = window.innerWidth / 2;\n      const cy = window.innerHeight / 2;\n      targetX = ((e.clientX - cx) / cx) * 14;\n      targetY = ((e.clientY - cy) / cy) * 14;\n    });\n    function loop() {\n      curX += (targetX - curX) * 0.06;\n      curY += (targetY - curY) * 0.06;\n      if (markImg) {\n        markImg.style.translate = `${curX}px ${curY}px`;\n      }\n      requestAnimationFrame(loop);\n    }\n    loop();\n  }\n\n  // --- count up stats ---\n  const countEls = document.querySelectorAll('[data-count]');\n  const ciO = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (!e.isIntersecting) return;\n      const el = e.target;\n      const target = parseInt(el.dataset.count, 10);\n      const suffix = el.dataset.suffix || '';\n      if (target === 0) { ciO.unobserve(el); return; }\n      let n = 0;\n      const dur = 1100;\n      const start = performance.now();\n      function tick(now) {\n        const t = Math.min(1, (now - start) / dur);\n        const eased = 1 - Math.pow(1 - t, 3);\n        n = Math.round(target * eased);\n        el.textContent = n + suffix;\n        if (t < 1) requestAnimationFrame(tick);\n      }\n      requestAnimationFrame(tick);\n      ciO.unobserve(el);\n    });\n  }, { threshold: 0.4 });\n  countEls.forEach(el => ciO.observe(el));\n\n  // --- background watermark parallax ---\n  // Logos drift at a slower speed than scroll, creating subtle depth.\n  const bgMarks = document.querySelectorAll('.bg-mark');\n  if (bgMarks.length) {\n    const speeds = [0.12, 0.18, 0.10, 0.20, 0.14, 0.16, 0.13];\n    const baseTops = Array.from(bgMarks).map(m => m.offsetTop);\n    let targetY = window.scrollY;\n    let curY = targetY;\n    window.addEventListener('scroll', () => { targetY = window.scrollY; }, { passive: true });\n    function tick() {\n      curY += (targetY - curY) * 0.12;\n      bgMarks.forEach((mark, i) => {\n        const offset = (curY - baseTops[i]) * speeds[i % speeds.length];\n        mark.style.transform = `translateY(${offset.toFixed(2)}px)`;\n      });\n      requestAnimationFrame(tick);\n    }\n    tick();\n  }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
